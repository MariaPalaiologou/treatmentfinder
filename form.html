<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Your Treatment — Nail &amp; Muse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --burg:#470B14;--burg-mid:#6B1420;--burg-light:#F2E8EA;--burg-pale:#FAF5F6;
      --suede:#AD7957;--suede-light:#F5EDE4;--warm-grey:#E3DDD5;
      --charcoal:#373636;--mid:#5A5555;--gray:#9A9494;--border:#DDD5CE;
    }
    html,body{min-height:100%;background:linear-gradient(160deg,#FAF5F6 0%,#F2E8EA 40%,#EDE0D8 100%);background-attachment:fixed;font-family:"Poppins",sans-serif;color:var(--charcoal)}
    .wrap{max-width:560px;margin:0 auto;padding:40px 20px 100px}
    .header{text-align:center;margin-bottom:36px}
    .logo{width:160px;height:auto;margin:0 auto 16px;display:block}
    .header-div{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--suede),transparent);margin:0 auto 16px}
    .header-sub{font-size:12px;color:var(--gray);font-weight:300;line-height:1.6}
    .prog-wrap{margin-bottom:28px}
    .prog-bar{height:2px;background:var(--warm-grey);border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--burg),var(--suede));border-radius:2px;transition:width .5s ease}
    .prog-label{font-size:10px;color:var(--gray);font-weight:300;margin-top:6px;letter-spacing:1px}
    .card{background:white;border-radius:20px;box-shadow:0 4px 40px rgba(71,11,20,.07);padding:36px 32px;animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .back-btn{background:none;border:none;color:var(--gray);font-family:"Poppins",sans-serif;font-size:11px;cursor:pointer;margin-bottom:20px;padding:0;display:flex;align-items:center;gap:5px;transition:color .15s}
    .back-btn:hover{color:var(--burg)}
    .step-lbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:10px}
    .question{font-family:"Playfair Display",serif;font-size:22px;font-weight:400;color:var(--charcoal);line-height:1.3;margin-bottom:8px}
    .q-note{font-size:12px;color:var(--gray);font-weight:300;margin-bottom:24px;line-height:1.6}
    .field-wrap{margin-bottom:18px}
    .field-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:7px}
    .field-input{width:100%;padding:12px 15px;border:1.5px solid var(--border);border-radius:10px;font-family:"Poppins",sans-serif;font-size:14px;color:var(--charcoal);outline:none;transition:border-color .2s;background:var(--burg-pale)}
    .field-input:focus{border-color:var(--burg);background:white}
    .t-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
    .t-tile{border:1.5px solid var(--border);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center;background:white;user-select:none}
    .t-tile:hover{border-color:var(--burg);background:var(--burg-pale);transform:translateY(-2px)}
    .t-tile.selected{border-color:var(--burg);background:var(--burg-light)}
    .t-tier{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:5px}
    .t-name{font-family:"Playfair Display",serif;font-size:14px;font-weight:400;color:var(--charcoal);line-height:1.3}
    .t-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:50%;margin:10px auto 0;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;transition:all .15s}
    .t-tile.selected .t-check{background:var(--burg);border-color:var(--burg)}
    .options{display:flex;flex-direction:column;gap:9px}
    .opt-btn{display:flex;align-items:center;gap:13px;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;background:white;cursor:pointer;text-align:left;transition:all .18s;width:100%;font-family:"Poppins",sans-serif;user-select:none}
    .opt-btn:hover{border-color:var(--burg);background:var(--burg-pale)}
    .opt-btn.selected{border-color:var(--burg);background:var(--burg-light)}
    .opt-text{flex:1}
    .opt-title{font-size:13px;font-weight:500;color:var(--charcoal);line-height:1.2}
    .opt-sub{font-size:11px;color:var(--gray);font-weight:300;margin-top:2px;line-height:1.4}
    .chk{width:19px;height:19px;border:1.5px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:white;transition:all .15s}
    .opt-btn.selected .chk{background:var(--burg);border-color:var(--burg)}
    .multi-hint{font-size:11px;color:var(--suede);font-weight:300;margin-bottom:13px;font-style:italic}
    .consent-box{border:1.5px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;cursor:pointer;transition:all .18s;user-select:none}
    .consent-box.checked{border-color:var(--burg);background:var(--burg-light)}
    .consent-row{display:flex;align-items:flex-start;gap:12px}
    .consent-chk{width:20px;height:20px;border:1.5px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:white;transition:all .15s;margin-top:1px}
    .consent-box.checked .consent-chk{background:var(--burg);border-color:var(--burg)}
    .consent-txt{font-size:12px;color:var(--mid);line-height:1.6;font-weight:300}
    .consent-txt strong{font-weight:500;color:var(--charcoal)}
    .next-btn{width:100%;padding:14px;background:var(--burg);color:white;border:none;border-radius:10px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s;margin-top:20px}
    .next-btn:hover{background:var(--burg-mid);transform:translateY(-1px)}
    .next-btn:disabled{background:#ccc;cursor:default;transform:none}
    .thankyou{text-align:center;padding:20px 0}
    .ty-icon{font-size:48px;margin-bottom:20px}
    .ty-title{font-family:"Playfair Display",serif;font-size:32px;font-weight:400;color:var(--burg);margin-bottom:12px;line-height:1.2}
    .ty-title em{font-style:italic}
    .ty-div{width:40px;height:1px;background:var(--suede);margin:20px auto}
    .ty-body{font-size:13px;color:var(--mid);line-height:1.8;font-weight:300;margin-bottom:12px}
    .ty-note{font-size:11px;color:var(--gray);font-weight:300;line-height:1.6;font-style:italic}
    .ornament{text-align:center;color:var(--suede);font-size:14px;letter-spacing:8px;margin:28px 0;opacity:.35;font-family:"Playfair Display",serif}
    @media(max-width:400px){.card{padding:28px 20px}.t-grid{grid-template-columns:1fr}.question{font-size:20px}}
  </style>
</head>

  if(attrs){ Object.keys(attrs).forEach(function(k){ var v=attrs[k]; if(k==="class") e.className=v; else if(k==="style") e.style.cssText=v; else if(k.indexOf("on")===0) e.addEventListener(k.slice(2).toLowerCase(),v); else e.setAttribute(k,v); }); }
  ch.forEach(function(c){ if(c==null) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}

function updateProgress(){
  var pct=S.submitted?100:Math.round((S.step/TOTAL)*100);
  document.getElementById("progress").style.width=pct+"%";
  var labels=["","Step 1 of "+TOTAL+" — Your details","Step 2 of "+TOTAL+" — Your treatment","Step 3 of "+TOTAL+" — Your skin","Step 4 of "+TOTAL+" — Your nails","Step 5 of "+TOTAL+" — Your health","Step 6 of "+TOTAL+" — Your profile","Step 7 of "+TOTAL+" — Almost done"];
  document.getElementById("prog-label").textContent=labels[S.step]||"";
}

function render(){
  var main=document.getElementById("main");
  main.innerHTML="";
  updateProgress();
  if(S.submitted){ main.appendChild(renderThankYou()); document.getElementById("prog-wrap").style.display="none"; return; }
  var screens=[renderName,renderTreatment,renderSkin,renderNails,renderHealth,renderHormonal,renderConsent];
  main.appendChild(screens[S.step]());
}

// STEP 1 — NAME & DOB
function renderName(){
  var card=el("div",{"class":"card"});
  card.appendChild(el("div",{"class":"step-lbl"},"Welcome, Muse"));
  card.appendChild(el("div",{"class":"question"},"May we know your name?"));
  card.appendChild(el("div",{"class":"q-note"},"This helps us personalise your experience today. Please see our data notice at the bottom of this page."));
  var fw=el("div",{"class":"field-wrap"});
  fw.appendChild(el("div",{"class":"field-lbl"},"First Name"));
  var fi=el("input",{"class":"field-input","type":"text","placeholder":"Your first name","value":S.firstName,"autocomplete":"given-name"});
  fi.addEventListener("input",function(e){S.firstName=e.target.value;});
  fw.appendChild(fi); card.appendChild(fw);
  var lw=el("div",{"class":"field-wrap"});
  lw.appendChild(el("div",{"class":"field-lbl"},"Last Name"));
  var li=el("input",{"class":"field-input","type":"text","placeholder":"Your last name","value":S.lastName,"autocomplete":"family-name"});
  li.addEventListener("input",function(e){S.lastName=e.target.value;});
  lw.appendChild(li); card.appendChild(lw);
  var dw=el("div",{"class":"field-wrap"});
  dw.appendChild(el("div",{"class":"field-lbl"},"Date of Birth"));
  var di=el("input",{"class":"field-input","type":"date","value":S.dob});
  di.addEventListener("change",function(e){S.dob=e.target.value;});
  dw.appendChild(di); card.appendChild(dw);
  var btn=el("button",{"class":"next-btn","onClick":function(){ if(S.firstName.trim().length<1||S.lastName.trim().length<1) return; S.step=1; render(); }},"Continue");
  card.appendChild(btn);
  // Data notice
  card.appendChild(el("div",{"style":"margin-top:20px;font-size:10px;color:var(--gray);line-height:1.6;font-weight:300;font-style:italic"},"Your name and date of birth are stored in our secure salon system to personalise your future visits, subject to your consent at the end of this form. If you do not consent, your personal details will be removed within 24 hours. Treatment data is used anonymously for service improvement."));
  return card;
}

// STEP 2 — TREATMENT
function renderTreatment(){
  var card=el("div",{"class":"card"});
  card.appendChild(el("button",{"class":"back-btn","onClick":function(){S.step=0;render();}},"← Back"));
  card.appendChild(el("div",{"class":"step-lbl"},"Your Treatment Today"));
  card.appendChild(el("div",{"class":"question"},"Which treatment have you booked today?"));
  card.appendChild(el("div",{"class":"q-note"},"You may select more than one if you have booked both a manicure and a pedicure."));
  var grid=el("div",{"class":"t-grid"});
  Object.keys(TREATMENTS).forEach(function(key){
    var t=TREATMENTS[key]; var sel=S.treatments.indexOf(key)>=0;
    var tile=el("div",{"class":"t-tile"+(sel?" selected":"")},el("div",{"class":"t-tier"},t.tier),el("div",{"class":"t-name"},t.name),el("div",{"class":"t-check"},sel?"✓":""));
    tile.addEventListener("click",function(){ var idx=S.treatments.indexOf(key); if(idx>=0) S.treatments.splice(idx,1); else S.treatments.push(key); render(); });
    grid.appendChild(tile);
  });
  card.appendChild(grid);
  var btn=el("button",{"class":"next-btn","onClick":function(){ if(!S.treatments.length) return; S.step=2; render(); }},"Continue");
  if(!S.treatments.length) btn.setAttribute("disabled","true");
  card.appendChild(btn);
  return card;
}

  var card=el("div",{"class":"card"});
  card.appendChild(el("button",{"class":"back-btn","onClick":function(){S.step=1;render();}},"← Back"));

  card.appendChild(el("div",{"class":"question"},"What are your skin concerns today?"));
  card.appendChild(el("div",{"class":"q-note"},"Please select all that apply — this helps us choose the right products for you."));
  card.appendChild(el("div",{"class":"multi-hint"},"You may select more than one."));
  var opts=el("div",{"class":"options"});
  getSkin().forEach(function(o){
    var sel=S.skin.indexOf(o.v)>=0;
    var btn=el("div",{"class":"opt-btn"+(sel?" selected":"")},el("div",{"class":"chk"},sel?"✓":""),el("div",{"class":"opt-text"},el("div",{"class":"opt-title"},o.t),o.s?el("div",{"class":"opt-sub"},o.s):null));

}

  var card=el("div",{"class":"card"});

  card.appendChild(el("div",{"class":"step-lbl"},"Almost There, Muse"));

  var consentBox=el("div",{"class":"consent-box"+(S.consent?" checked":"")});
  var row=el("div",{"class":"consent-row"},
    el("div",{"class":"consent-chk"},S.consent?"✓":""),
    el("div",{"class":"consent-txt"},
      el("strong",{},"Yes, please save my treatment plan for future visits.")));
  consentBox.appendChild(row);
  consentBox.addEventListener("click",function(){ S.consent=!S.consent; render(); });
  card.appendChild(consentBox);
  card.appendChild(el("button",{"class":"next-btn","onClick":submitForm},"Submit my answers"));
  return card;
}

// SUBMIT
function submitForm(){
  if(S.submitted) return;
  S.submitted=true;
  var sid="cf_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
  var treatmentNames=S.treatments.map(function(k){ return TREATMENTS[k]?TREATMENTS[k].name:""; }).join(" + ");
  var fullName=(S.firstName+" "+S.lastName).trim();
  var payload={
    timestamp:      new Date().toLocaleString("nl-NL",{timeZone:"Europe/Amsterdam"}),
    client_name:    fullName,
    client_dob:     S.dob||"",
    treatment:      treatmentNames,
    treatment_keys: S.treatments.join(","),
    skin:           S.skin.join(", ")||"None",
    nails:          S.nails.join(", ")||"None",
    health_flags:   S.health.join(", ")||"None",
    hormonal:       S.hormonal||"Not shared",
    recommended:    "",
    steps_json:     "",
    glance_json:    "",
    protocols:      "",
    therapist_notes:"",
    agreed:         "",
    alt_path:       "",
    consent:        S.consent?"Yes":"No",
    source:         "client_form",
    session_id:     sid
  };
  if(SHEETS_URL&&SHEETS_URL!=="YOUR_SHEETS_URL_HERE"){
    fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}).catch(function(){});
  }
  render();
}

// THANK YOU
function renderThankYou(){
  var first=S.firstName||"Muse";
  var div=el("div",{"class":"card thankyou"});
  div.appendChild(el("div",{"class":"ty-icon"},"✦"));
  div.appendChild(el("div",{"class":"ty-title"},"Thank you, ",el("em",{},first),"."));
  div.appendChild(el("div",{"class":"ty-div"}));
  div.appendChild(el("div",{"class":"ty-body"},"Your answers have been received. Your personalised treatment plan is being prepared — your technician will walk you through every step before you begin."));
  div.appendChild(el("div",{"class":"ty-note"},"Sit back, relax, and let us take care of the rest."));
  if(!S.consent){
    div.appendChild(el("div",{"class":"ty-note","style":"margin-top:12px"},"As requested, your personal details will be removed from our records within 24 hours."));
  }
  return div;
}
