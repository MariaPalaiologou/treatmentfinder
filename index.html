<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Treatment Guide — Nail &amp; Muse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --burg:#470B14;--burg-mid:#6B1420;--burg-light:#F2E8EA;--burg-pale:#FAF5F6;
      --suede:#AD7957;--suede-light:#F5EDE4;--warm-grey:#E3DDD5;
      --charcoal:#373636;--mid:#5A5555;--gray:#9A9494;--border:#DDD5CE;
      --green:#2D7A4F;--green-bg:#F0FFF4;
    }
    html,body{min-height:100%;background:#F7F4F1;font-family:"Poppins",sans-serif;color:var(--charcoal)}

    /* LOCK */
    #lock-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FAF5F6 0%,#F2E8EA 50%,#EDE0D8 100%)}
    .lock-card{background:white;border-radius:20px;box-shadow:0 8px 48px rgba(71,11,20,.10);padding:52px 44px;width:100%;max-width:400px;text-align:center;animation:fadeUp .4s ease both}
    .lock-logo{width:180px;height:auto;margin:0 auto 20px;display:block}
    .lock-div{width:40px;height:1px;background:var(--suede);margin:0 auto 22px}
    .lock-card h2{font-family:"Playfair Display",serif;font-size:26px;font-weight:400;color:var(--charcoal);margin-bottom:8px}
    .lock-card h2 em{font-style:italic;color:var(--burg)}
    .lock-card p{font-size:12px;color:var(--gray);font-weight:300;margin-bottom:28px;line-height:1.6}
    .lock-input{width:100%;padding:13px 18px;border:1.5px solid var(--border);border-radius:10px;font-family:"Poppins",sans-serif;font-size:14px;color:var(--charcoal);outline:none;transition:border-color .2s;margin-bottom:12px;letter-spacing:3px;text-align:center;background:var(--burg-pale)}
    .lock-input:focus{border-color:var(--burg);background:white}
    .lock-input.err{border-color:#C0392B;animation:shake .3s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .lock-btn{width:100%;padding:13px;background:var(--burg);color:white;border:none;border-radius:10px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s}
    .lock-btn:hover{background:var(--burg-mid)}
    .lock-err{font-size:12px;color:#C0392B;margin-top:10px;height:16px}

    /* APP */
    #app{display:none}
    .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:44px 20px 100px;background:linear-gradient(160deg,#FAF5F6 0%,#F2E8EA 40%,#EDE0D8 100%);background-attachment:fixed}

    /* HEADER */
    .header{text-align:center;margin-bottom:28px}
    .header-logo{width:160px;height:auto;margin:0 auto 14px;display:block}
    .header-div{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--suede),transparent);margin:0 auto 12px}
    .header-sub{font-size:11px;font-weight:300;color:var(--gray)}

    /* TABS */
    .tab-bar{display:flex;gap:0;margin-bottom:28px;background:white;border-radius:12px;padding:4px;box-shadow:0 2px 16px rgba(71,11,20,.06);width:100%;max-width:620px}
    .tab-btn{flex:1;padding:10px 6px;border:none;background:transparent;font-family:"Poppins",sans-serif;font-size:10px;font-weight:400;color:var(--gray);letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:9px;transition:all .2s}
    .tab-btn.active{background:var(--burg);color:white;font-weight:500}

    /* PROGRESS */
    .prog-wrap{width:100%;max-width:620px;margin-bottom:28px}
    .prog-bar{height:2px;background:var(--warm-grey);border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--burg),var(--suede));border-radius:2px;transition:width .5s ease}

    /* CARD */
    .card{background:white;border-radius:20px;box-shadow:0 4px 40px rgba(71,11,20,.07),0 1px 8px rgba(0,0,0,.03);padding:40px 44px;width:100%;max-width:620px;animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .back-btn{background:none;border:none;color:var(--gray);font-family:"Poppins",sans-serif;font-size:11px;cursor:pointer;margin-bottom:20px;padding:0;display:flex;align-items:center;gap:5px;transition:color .15s}
    .back-btn:hover{color:var(--burg)}
    .step-lbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:10px}
    .question{font-family:"Playfair Display",serif;font-size:22px;font-weight:400;color:var(--charcoal);line-height:1.3;margin-bottom:8px}
    .q-note{font-size:12px;color:var(--gray);font-weight:300;margin-bottom:22px;line-height:1.6}

    /* CLIENT NAME */
    .cname-wrap{margin-bottom:22px}
    .cname-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:7px}
    .cname-input{width:100%;padding:11px 15px;border:1.5px solid var(--border);border-radius:10px;font-family:"Poppins",sans-serif;font-size:14px;color:var(--charcoal);outline:none;transition:border-color .2s;background:var(--burg-pale)}
    .cname-input:focus{border-color:var(--burg);background:white}

    /* TREATMENT TILES */
    .t-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .t-tile{border:1.5px solid var(--border);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center;background:white}
    .t-tile:hover{border-color:var(--burg);background:var(--burg-pale);transform:translateY(-2px)}
    .t-tile.selected{border-color:var(--burg);background:var(--burg-light)}
    .t-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:50%;margin:8px auto 0;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;transition:all .15s}
    .t-tile.selected .t-check{background:var(--burg);border-color:var(--burg)}
    .t-tier{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:5px}
    .t-name{font-family:"Playfair Display",serif;font-size:14px;font-weight:400;color:var(--charcoal);line-height:1.3}

    /* OPTIONS */
    .options{display:flex;flex-direction:column;gap:9px}
    .opt-btn{display:flex;align-items:center;gap:13px;padding:12px 15px;border:1.5px solid var(--border);border-radius:12px;background:white;cursor:pointer;text-align:left;transition:all .18s;width:100%;font-family:"Poppins",sans-serif}
    .opt-btn:hover{border-color:var(--burg);background:var(--burg-pale);transform:translateX(2px)}
    .opt-icon{font-size:15px;width:34px;height:34px;background:var(--burg-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .opt-text{flex:1}
    .opt-title{font-size:13px;font-weight:500;color:var(--charcoal);line-height:1.2}
    .opt-sub{font-size:11px;color:var(--gray);font-weight:300;margin-top:2px;line-height:1.4}
    .opt-arr{color:var(--border);font-size:13px}
    .multi-hint{font-size:11px;color:var(--suede);font-weight:300;margin-bottom:12px}
    .multi-opt{display:flex;align-items:center;gap:13px;padding:12px 15px;border:1.5px solid var(--border);border-radius:12px;background:white;cursor:pointer;transition:all .18s;user-select:none}
    .multi-opt:hover{border-color:var(--burg);background:var(--burg-pale)}
    .multi-opt.checked{border-color:var(--burg);background:var(--burg-light)}
    .chk{width:19px;height:19px;border:1.5px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:white;transition:all .15s}
    .multi-opt.checked .chk{background:var(--burg);border-color:var(--burg)}
    .cont-btn{margin-top:18px;width:100%;padding:13px;background:var(--burg);color:white;border:none;border-radius:10px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s}
    .cont-btn:hover{background:var(--burg-mid);transform:translateY(-1px)}
    .cont-btn:disabled{background:#ccc;cursor:default;transform:none}

    /* PENDING NOTIFICATION */
    .pending-banner{background:var(--green-bg);border:1.5px solid var(--green);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .18s;width:100%;max-width:620px}
    .pending-banner:hover{transform:translateX(2px)}
    .pending-dot{width:10px;height:10px;background:var(--green);border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .pending-txt{flex:1;font-size:13px;color:var(--green);font-weight:500}
    .pending-sub{font-size:11px;color:var(--green);font-weight:300;opacity:.8}

    /* RESULT CARD */
    .res-card{background:white;border-radius:20px;box-shadow:0 4px 40px rgba(71,11,20,.09);width:100%;max-width:620px;overflow:hidden;animation:fadeUp .4s ease both;margin-bottom:16px}
    .res-hdr{background:var(--burg);padding:32px 40px;color:white;position:relative;overflow:hidden}
    .res-hdr::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04)}
    .res-tier{font-size:9px;letter-spacing:4px;text-transform:uppercase;opacity:.7;margin-bottom:8px;font-weight:400}
    .res-name{font-family:"Playfair Display",serif;font-size:28px;font-weight:400;line-height:1.2;margin-bottom:4px}
    .res-client{font-size:13px;opacity:.8;font-weight:300}
    .res-body{padding:32px 40px}
    .sec-lbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:12px}

    /* AT A GLANCE */
    .glance-box{background:var(--burg-pale);border-radius:12px;padding:18px 20px;margin-bottom:24px}
    .glance-items{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .glance-item{background:white;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--charcoal);font-weight:400;display:flex;align-items:center;gap:6px}
    .glance-item span{font-weight:300;color:var(--suede)}

    /* STEPS */
    .steps{margin-bottom:20px}
    .step-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #F5F0EE}
    .step-item:last-child{border-bottom:none}
    .step-num{width:24px;height:24px;background:var(--burg-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:500;color:var(--burg);margin-top:1px}
    .step-body{flex:1}
    .step-name{font-size:13px;font-weight:500;color:var(--charcoal);line-height:1.3}
    .step-detail{font-size:12px;color:var(--gray);font-weight:300;margin-top:3px;line-height:1.55}
    .step-tag{display:inline-block;font-size:10px;background:var(--burg-light);color:var(--burg);padding:2px 10px;border-radius:20px;margin-top:5px;font-weight:500}
    .step-tag.s{background:var(--suede-light);color:var(--suede)}
    .step-why{background:#FDFAF7;border-left:3px solid var(--suede);border-radius:0 8px 8px 0;padding:8px 12px;margin-top:8px;font-size:11px;color:#4A3728;font-weight:400;line-height:1.6;font-style:italic}

    /* PROTOCOLS / NOTES */
    .protocols{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
    .badge{background:var(--burg-light);color:var(--burg);font-size:10px;font-weight:500;padding:4px 13px;border-radius:20px}
    .notes-box{background:#FBF8F3;border:1px solid #E8DFCC;border-radius:12px;padding:14px 16px;margin-bottom:18px}
    .notes-lbl{font-size:9px;letter-spacing:3px;color:var(--suede);font-weight:500;margin-bottom:8px;text-transform:uppercase}
    .note-item{font-size:12px;color:#7A6340;line-height:1.6;padding:3px 0;display:flex;gap:8px}

    /* AGREEMENT */
    .agree-sec{border-top:1px solid #F0EAE8;padding-top:20px;margin-top:4px}
    .agree-q{font-family:"Playfair Display",serif;font-size:16px;color:var(--charcoal);margin-bottom:14px;line-height:1.3}
    .agree-btns{display:flex;gap:10px;margin-bottom:14px}
    .agree-btn{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .18s;background:white;color:var(--charcoal);letter-spacing:1px}
    .agree-btn.yes.on{background:var(--green);border-color:var(--green);color:white}
    .agree-btn.no.on{background:var(--charcoal);border-color:var(--charcoal);color:white}
    .alt-lbl{font-size:11px;color:var(--mid);margin-bottom:8px;font-weight:400}
    .alt-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:"Poppins",sans-serif;font-size:13px;color:var(--charcoal);outline:none;resize:vertical;min-height:70px;transition:border-color .2s;background:var(--burg-pale)}
    .alt-input:focus{border-color:var(--burg);background:white}
    .save-plan-btn{margin-top:12px;width:100%;padding:12px;background:var(--burg);color:white;border:none;border-radius:10px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s}
    .save-plan-btn:hover{background:var(--burg-mid)}
    .save-plan-btn:disabled{background:#ccc;cursor:default}
    .save-status{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;padding:11px;border-radius:10px;margin-top:10px}
    .save-status.saving{background:#FBF8F3;color:var(--suede)}
    .save-status.saved{background:var(--green-bg);color:var(--green)}
    .save-status.error{background:#FFF0F0;color:#C0392B}
    .restart-btn{margin-top:10px;width:100%;padding:12px;background:transparent;color:var(--burg);border:1.5px solid var(--burg);border-radius:10px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s}
    .restart-btn:hover{background:var(--burg-light)}
    .ornament{text-align:center;color:var(--suede);font-size:14px;letter-spacing:8px;margin:20px 0 40px;opacity:.35;font-family:"Playfair Display",serif}

    /* PLANS TAB */
    .plans-wrap{width:100%;max-width:620px}
    .plans-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .plans-title{font-family:"Playfair Display",serif;font-size:20px;font-weight:400;color:var(--charcoal)}
    .refresh-btn{background:transparent;border:1.5px solid var(--border);color:var(--mid);font-family:"Poppins",sans-serif;font-size:10px;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .18s}
    .refresh-btn:hover{border-color:var(--burg);color:var(--burg)}
    .plans-search-wrap{position:relative;margin-bottom:12px}
    .plans-search{width:100%;padding:10px 15px 10px 36px;border:1.5px solid var(--border);border-radius:10px;font-family:"Poppins",sans-serif;font-size:13px;color:var(--charcoal);outline:none;transition:border-color .2s;background:white}
    .plans-search:focus{border-color:var(--burg)}
    .plans-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:13px;pointer-events:none}
    .plans-count{font-size:11px;color:var(--gray);font-weight:300;margin-bottom:12px}
    .plans-list{display:flex;flex-direction:column;gap:8px}
    .plan-row{background:white;border-radius:14px;padding:13px 16px;box-shadow:0 2px 12px rgba(71,11,20,.05);border:1.5px solid transparent;display:flex;align-items:center;gap:10px;transition:border-color .18s}
    .plan-row:hover{border-color:var(--border)}
    .plan-row.no-consent{border-color:#FDEBD0;background:#FFFBF5}
    .plan-dot{width:8px;height:8px;background:var(--burg);border-radius:50%;flex-shrink:0}
    .plan-dot.expiring{background:var(--suede)}
    .plan-info{flex:1;cursor:pointer;min-width:0}
    .plan-info:hover .plan-name{color:var(--burg)}
    .plan-name{font-size:13px;font-weight:500;color:var(--charcoal);transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-meta{font-size:11px;color:var(--mid);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-date{font-size:10px;color:var(--gray);margin-top:2px;font-weight:300}
    .plan-open-btn{background:transparent;border:none;color:var(--gray);font-size:16px;cursor:pointer;padding:4px 6px;transition:color .15s;flex-shrink:0}
    .plan-open-btn:hover{color:var(--burg)}
    .plan-del-btn{background:transparent;border:1.5px solid #EECECE;color:#C0392B;font-family:"Poppins",sans-serif;font-size:10px;font-weight:500;padding:4px 10px;border-radius:8px;cursor:pointer;transition:all .18s;flex-shrink:0}
    .plan-del-btn:hover{background:#FFF0F0;border-color:#C0392B}
    .del-confirm{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .del-confirm-txt{font-size:10px;color:#C0392B;font-weight:400}
    .del-yes-btn{background:#C0392B;border:none;color:white;font-family:"Poppins",sans-serif;font-size:10px;font-weight:500;padding:4px 10px;border-radius:8px;cursor:pointer}
    .del-yes-btn:hover{background:#A93226}
    .del-no-btn{background:transparent;border:1.5px solid var(--border);color:var(--mid);font-family:"Poppins",sans-serif;font-size:10px;padding:4px 8px;border-radius:8px;cursor:pointer}
    .plans-empty{text-align:center;padding:50px 20px;color:var(--gray);font-size:13px;font-weight:300;line-height:1.8}
    .plans-loading{text-align:center;padding:50px 20px;color:var(--suede);font-size:13px}
    .pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--warm-grey)}
    .page-btn{background:white;border:1.5px solid var(--border);color:var(--mid);font-family:"Poppins",sans-serif;font-size:11px;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all .18s}
    .page-btn:hover{border-color:var(--burg);color:var(--burg)}
    .page-btn:disabled{opacity:.35;cursor:default}
    .page-info{font-size:11px;color:var(--gray);font-weight:300;min-width:70px;text-align:center}
    .no-consent-badge{font-size:9px;background:#FEF3E2;color:#AD7957;padding:2px 8px;border-radius:10px;font-weight:500;margin-left:6px;vertical-align:middle}

    /* CHECK-IN TAB */
    .checkin-wrap{width:100%;max-width:500px;text-align:center}
    .checkin-card{background:white;border-radius:20px;box-shadow:0 4px 40px rgba(71,11,20,.07);padding:44px 40px}
    .checkin-title{font-family:"Playfair Display",serif;font-size:24px;font-weight:400;color:var(--charcoal);margin-bottom:8px}
    .checkin-sub{font-size:12px;color:var(--gray);font-weight:300;margin-bottom:32px;line-height:1.6}
    #qrcode{display:flex;justify-content:center;margin-bottom:24px}
    #qrcode canvas,#qrcode img{border:8px solid white;border-radius:8px;box-shadow:0 4px 20px rgba(71,11,20,.1)}
    .checkin-url{font-size:11px;color:var(--suede);word-break:break-all;margin-bottom:20px;font-family:"Poppins",sans-serif}
    .checkin-steps{text-align:left;margin-top:24px}
    .checkin-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #F5F0EE;font-size:12px;color:var(--mid)}
    .checkin-step:last-child{border-bottom:none}
    .cs-num{width:22px;height:22px;background:var(--burg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;flex-shrink:0;font-weight:500}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(55,54,54,.72);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-card{background:white;border-radius:20px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .modal-hdr{background:var(--burg);padding:24px 32px;color:white;position:sticky;top:0;display:flex;justify-content:space-between;align-items:flex-start;border-radius:20px 20px 0 0;z-index:1}
    .modal-hdr-text{flex:1}
    .modal-tier{font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:6px}
    .modal-tname{font-family:"Playfair Display",serif;font-size:20px;font-weight:400;line-height:1.2;margin-bottom:4px}
    .modal-client{font-size:12px;opacity:.8;font-weight:300}
    .modal-close{background:rgba(255,255,255,.2);border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;margin-left:14px;line-height:1}
    .modal-close:hover{background:rgba(255,255,255,.35)}
    .modal-body{padding:24px 32px}
    .modal-agree{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;margin-bottom:18px}
    .modal-agree.yes{background:var(--green-bg);color:var(--green)}
    .modal-agree.no{background:#FFF0F0;color:#C0392B}

    @media(max-width:560px){
      .card,.res-body,.modal-body{padding:28px 20px}
      .res-hdr,.modal-hdr{padding:24px 20px}
      .res-name,.modal-tname{font-size:22px}
      .t-grid{grid-template-columns:1fr}
      .lock-card{padding:36px 24px}
    }
  </style>
</head>

function unlock(){
  var input=document.getElementById("pw-input"), err=document.getElementById("pw-err");
  if(input.value===STAFF_PASSWORD){
    sessionStorage.setItem(SESSION_KEY,"true");
    document.getElementById("lock-screen").style.display="none";
    document.getElementById("app").style.display="block";
    cleanExpiredPlans();
    checkPending();
    render();
  } else {
    err.textContent="Incorrect password. Please try again.";
    input.classList.add("err"); input.value="";
    setTimeout(function(){ input.classList.remove("err"); },400);
  }
}

// Auto-delete expired (no-consent) plans
function cleanExpiredPlans(){
  var plans=JSON.parse(localStorage.getItem(PLANS_KEY)||"[]");
  var now=Date.now();
  var cleaned=plans.filter(function(p){ return !p.expires||p.expires>now; });
  if(cleaned.length!==plans.length) localStorage.setItem(PLANS_KEY,JSON.stringify(cleaned));
}

// ── CLIENT FORM POLLING ──────────────────────────────────────────
var SEEN_KEY = "nm_seen_sessions";
function getSeenSessions(){ try{ return JSON.parse(localStorage.getItem(SEEN_KEY)||"[]"); }catch(e){ return []; } }
function markSeen(sid){ var s=getSeenSessions(); if(s.indexOf(sid)<0){ s.push(sid); localStorage.setItem(SEEN_KEY,JSON.stringify(s)); } }

function pollSheets(){
  if(!SHEETS_URL||SHEETS_URL==="https://script.google.com/macros/s/AKfycbzmVlKz2iTixRiMqPUXQriTxODfcVOU-PokH231I0G42DX_VaAS1m0I36SpN6pxVHRbdg/exec") return;
  fetch(SHEETS_URL)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!Array.isArray(data)) return;
      var seen=getSeenSessions();
      // Find unseen client_form rows from last 4 hours
      var cutoff=Date.now()-(4*60*60*1000);
      var newForms=data.filter(function(row){
        var src=String(row["Source"]||row.source||"");
        var sid=String(row["Session Id"]||row["Session ID"]||row.session_id||"");
        if(src!=="client_form"||!sid||seen.indexOf(sid)>=0) return false;
        return true;
      });
      if(!newForms.length) return;
      // Store as pending in localStorage
      var pending=JSON.parse(localStorage.getItem(PENDING_KEY)||"[]");
      var existingIds=pending.map(function(p){ return p.id; });
      newForms.forEach(function(row){
        var sid=String(row["Session Id"]||row["Session ID"]||row.session_id||"");
        if(existingIds.indexOf(sid)>=0) return;
        var treatmentKeys=String(row["Treatment Keys"]||row.treatment_keys||"").split(",").filter(Boolean);
        var skinArr=String(row["Skin"]||row.skin||"None").split(",").map(function(s){return s.trim();}).filter(function(s){return s&&s!=="None";});
        var nailArr=String(row["Nails"]||row.nails||"None").split(",").map(function(s){return s.trim();}).filter(function(s){return s&&s!=="None";});
        var healthArr=String(row["Health Flags"]||row.health_flags||"None").split(",").map(function(s){return s.trim();}).filter(function(s){return s&&s!=="None";});
        pending.unshift({
          id:             sid,
          timestamp:      String(row["Timestamp"]||row.timestamp||""),
          client_name:    String(row["Client Name"]||row.client_name||""),
          client_dob:     String(row["Client Dob"]||row["Client DOB"]||row.client_dob||""),
          treatment:      String(row["Treatment"]||row.treatment||""),
          treatment_keys: treatmentKeys,
          skin:           skinArr,
          nails:          nailArr,
          health:         healthArr,
          hormonal:       String(row["Hormonal"]||row.hormonal||"unknown"),
          consent:        String(row["Consent"]||row.consent||"No")==="Yes",
          status:         "pending"
        });
        existingIds.push(sid);
      });
      localStorage.setItem(PENDING_KEY,JSON.stringify(pending));
      checkPending();
    })
    .catch(function(){});
}

function checkPending(){
  if(typeof S==="undefined") return;
  var area=document.getElementById("pending-area");
  if(!area||!isAuth()) return;
  area.innerHTML="";
  if(S.tab!=="new"||S.done) return;
  var pending=JSON.parse(localStorage.getItem(PENDING_KEY)||"[]");
  var unprocessed=pending.filter(function(p){ return p.status==="pending"; });
  if(!unprocessed.length) return;
  unprocessed.forEach(function(p){
    var name=p.client_name||"A Muse";
    var treatment=p.treatment||"Treatment";
    var banner=el("div",{"class":"pending-banner","onClick":function(){ processPending(p); }},
      el("div",{"class":"pending-dot"}),
      el("div",{"class":"pending-txt"},
        el("div",{},name+" — "+treatment),
        el("div",{"class":"pending-sub"},"Client questionnaire received — tap to view plan")),
      el("span",{"style":"color:var(--burg);font-size:16px"},"›"));
    area.appendChild(banner);
  });
}

function processPending(p){
  // Mark as seen and processed
  markSeen(p.id);
  var pending=JSON.parse(localStorage.getItem(PENDING_KEY)||"[]");
  pending=pending.map(function(x){ return x.id===p.id?Object.assign({},x,{status:"processed"}):x; });
  localStorage.setItem(PENDING_KEY,JSON.stringify(pending));
  // Parse skin/nails/health into answers
  var skinAll=Array.isArray(p.skin)?p.skin:[];
  var nailAll=Array.isArray(p.nails)?p.nails:[];
  var healthAll=Array.isArray(p.health)?p.health:[];
  S.clientName=p.client_name||"";
  S.fromPending=p;
  S.treatment=p.treatment_keys&&p.treatment_keys.length?p.treatment_keys[0]:null;
  S.selectedTreatments=p.treatment_keys||[];
  S.answers={
    skin_focus:         skinAll[0]||"none",
    skin_focus_all:     skinAll,
    nail_condition:     nailAll[0]||"healthy",
    nail_condition_all: nailAll,
    health_flags:       healthAll,
    hormonal:           p.hormonal||"unknown"
  };
  S.consent=p.consent;
  S.done=true;
  S.tab="new";
  ["tab-new-btn","tab-plans-btn","tab-checkin-btn"].forEach(function(id){ document.getElementById(id).classList.remove("active"); });
  document.getElementById("tab-new-btn").classList.add("active");
  document.getElementById("prog-wrap").style.display="block";
  document.getElementById("pending-area").innerHTML="";
  render();
}

// ── RECOMMENDATION ENGINE ──────────────────────────────────────────
function buildRec(){
  var a=S.answers;
  var hf=Array.isArray(a.health_flags)?a.health_flags:[];
  var skins=Array.isArray(a.skin_focus_all)?a.skin_focus_all:(a.skin_focus?[a.skin_focus]:[]);
  var nails=Array.isArray(a.nail_condition_all)?a.nail_condition_all:(a.nail_condition?[a.nail_condition]:[]);
  function has(arr,v){ return arr.indexOf(v)>=0; }
  function hasSkin(v){ return has(skins,v); }
  function hasNail(v){ return has(nails,v); }

  var isPeri   = a.hormonal==="peri"||a.hormonal==="hrt";
  var isDiab   = has(hf,"diabetes");
  var isIsot   = has(hf,"isotretinoin");
  var isArth   = has(hf,"arthritis");
  var isPreg   = has(hf,"pregnancy");
  var nutAllerg= has(hf,"nut_allergy");
  var fragSens = has(hf,"fragrance");
  var noHeat   = has(hf,"no_heat")||isIsot;
  var mani=isManiPath(), pedi=isPediPath(), editMani=isEditMani(), ceremPedi=isCeremPedi(), tier2=isTier2();

  // Primary skin concern (priority order for product selection)
  var sf = hasSkin("sensitivity")?"sensitivity":hasSkin("antiaging")?"antiaging":hasSkin("pigmentation")?"pigmentation":hasSkin("cracked_heels")?"cracked_heels":hasSkin("calluses")?"calluses":hasSkin("hydration")?"hydration":"none";
  // Primary nail concern
  var nc = hasNail("fungal")?"fungal":hasNail("ingrown")?"ingrown":hasNail("onycholysis")?"onycholysis":hasNail("thickened")?"thickened":hasNail("yellow")?"yellow":hasNail("brittle")?"brittle":hasNail("soft")?"soft":hasNail("bitten")?"bitten":"healthy";

  var steps=[], glance=[], notes=[], protocols=[];

  function addStep(s){ steps.push(s); glance.push({label:s.name,value:s.glance||s.name}); }

  // RUSSIAN TECHNIQUE
  var nailName=mani?"Russian Manicure":"Russian Pedicure", nailNote, nailGlance;
  if(nc==="fungal"){ nailNote="STOP — active fungal infection. No polish or overlay. Antifungal soak only. Refer to GP/podiatrist. Sanitise all tools. Document in notes."; nailGlance="Antifungal only — Referral"; }
  else if(nc==="onycholysis"){ nailNote="Onycholysis detected — no soaking, no cleaning under nail plate. BIAB not recommended. Keep nails short. Refer to dermatologist if spreading."; nailGlance="Gentle technique — No BIAB"; }
  else if(nc==="ingrown"){ nailNote="Ingrown toenail — file straight across only. Do not cut corners or lift embedded edge. Refer to podiatrist if inflamed."; nailGlance="Safe filing only — Referral if inflamed"; }
  else if(nc==="thickened"){ nailNote="Thickened nails — gentle filing only, no excess pressure. Refer to podiatrist if severely thickened. No gel overlay."; nailGlance="Gentle filing — No overlay"; }
  else if(nc==="yellow"){ nailNote="Yellow/discoloured nails — apply antifungal base coat. Do not apply coloured polish until cause identified. Document and advise."; nailGlance="Antifungal base — No colour"; }
  else if(nc==="brittle"||nc==="soft"){ nailNote="BIAB overlay strongly recommended — protects nail plate. Avoid prolonged soaking before cuticle work."; nailGlance="BIAB recommended"; }
  else if(nc==="bitten"){ nailNote="BIAB overlay recommended to strengthen and encourage growth. Gentle around hyponychium."; nailGlance="BIAB for growth"; }
  else{ nailNote="Standard technique. Nails in good condition — client has full choice of finish."; nailGlance="Standard"; }
  var nailWhy=nc==="fungal"?"Active infection — referral and infection control take priority.":nc==="onycholysis"?"Nail plate separation requires minimal intervention to avoid worsening.":nc==="ingrown"?"Incorrect technique risks pain and infection.":nc==="thickened"?"Thickened nails need extra care to avoid nail bed damage.":nc==="yellow"?"Discolouration may signal underlying issue — document first.":nc==="brittle"||nc==="soft"?"Estrogen decline and ageing reduce nail keratin — overlay protects the plate.":nc==="bitten"?"Short nails benefit from overlay to support regrowth.":"Nails in good condition — standard technique appropriate.";
  addStep({name:nailName,detail:nailNote,why:nailWhy,glance:nailGlance,tag:nc==="fungal"?"Referral required":nc==="ingrown"?"Handle with care":null});

  // HEEL CLEANSE (pedicure)
  if(pedi){
    var heelNote,heelGlance;
    if(isDiab){ heelNote="Electric file only — no blade. No aggressive heat. Check circulation before starting."; heelGlance="Electric file — Diabetic-safe"; }
    else if(nc==="ingrown"){ heelNote="Do not cut corners. File straight across only."; heelGlance="Safe filing only"; }
    else if(sf==="cracked_heels"){ heelNote="Extended cleanse — focus on fissure borders. Soften thoroughly before any mechanical removal."; heelGlance="Extended — fissure focus"; }
    else if(sf==="calluses"){ heelNote="Medical-grade callus removal — blade or file as appropriate. Focus on ball of foot and heel borders. Do not over-remove."; heelGlance="Callus removal"; }
    else{ heelNote="Standard heel cleanse — blade or electric file. Focus on lateral heel borders and ball of foot."; heelGlance="Standard"; }
    var heelWhy=isDiab?"Diabetes reduces sensation — blade risks undetected injury.":sf==="cracked_heels"?"Deep fissures need gradual softening before mechanical removal.":sf==="calluses"?"Targeted removal at pressure points — heel borders and ball of foot.":"Standard maintenance appropriate for current foot condition.";
    addStep({name:"Heel Cleanse",detail:heelNote,why:heelWhy,glance:heelGlance,tag:isDiab?"Diabetic-safe":null});
  }

  // SOAK (pedicure)
  if(pedi){
    var soakName,soakDetail,soakGlance;
    if(ceremPedi){ soakName="AHA & BHA Soaking Salt"; soakDetail="Strongly softening soak with AHA & BHA acids for exfoliation and skin regeneration. 10-15 minutes."; soakGlance="AHA & BHA Salt"; }
    else{ soakName="Bath Pearls Soak"; soakDetail="Smoothing, soothing and antiseptic bath pearls. 10-15 minutes."; soakGlance="Bath Pearls"; }
    addStep({name:soakName,detail:soakDetail,why:"Soak is fixed per tier — softens skin and prepares nails for treatment.",glance:soakGlance,tag:null,ts:"s"});
  }

  // SCRUB (Edit & Ceremony only)
  if(tier2){
    var scrubName,scrubDetail,scrubGlance;
    if(editMani){ scrubName="Vitamin C Scrub"; scrubDetail="Vitamin C exfoliating scrub — brightens and evens skin tone while removing dead cells. 5 minutes."; scrubGlance="Vitamin C Scrub — 5 min"; }
    else{ scrubName="Foot Scrub"; scrubDetail="Exfoliating foot scrub — removes dead cells and prepares skin for mask and paraffin. 5 minutes."; scrubGlance="Foot Scrub — 5 min"; }
    addStep({name:scrubName,detail:scrubDetail,why:editMani?"Vitamin C scrub brightens and prepares skin for serum and mask.":"Scrub prepares skin for deeper treatment steps.",glance:scrubGlance,tag:null,ts:"s"});
  }

  // SERUM (Edit Manicure only)
  if(editMani){
    var serumName,serumDetail,serumWhy,serumGlance,serumTag=null;
    if(isIsot||isPreg||sf==="sensitivity"){ serumName="Hyaluronic Acid Serum"; serumDetail="Deeply hydrating HA serum — safe for sensitive, pregnant and isotretinoin-treated skin."; serumWhy=isIsot?"Isotretinoin compromises skin barrier — HA hydrates without irritation.":isPreg?"Retinol and active acids are contraindicated in pregnancy — HA is safe.":"Sensitive skin cannot tolerate actives — HA is the safest choice."; serumGlance="Hyaluronic Acid"; }
    else if(sf==="pigmentation"){ serumName="Niacinamide Serum"; serumDetail="Niacinamide — interrupts melanin transfer and brightens uneven pigmentation."; serumWhy="Niacinamide directly addresses pigmentation concern at cellular level."; serumGlance="Niacinamide"; }
    else if(sf==="antiaging"&&isPeri){ serumName="Copper Peptides Serum"; serumDetail="Copper peptides — supports collagen synthesis. Gentler than retinol, ideal for perimenopausal skin."; serumWhy="Perimenopausal skin benefits from peptide collagen support rather than potentially stimulating retinol."; serumGlance="Copper Peptides"; }
    else if(sf==="antiaging"&&!isPeri){ serumName="Retinol Serum"; serumDetail="Retinol — stimulates cell turnover and collagen production. SPF applied after."; serumWhy="Retinol is the gold standard anti-ageing active — stimulates fibroblast activity and collagen production."; serumGlance="Retinol + SPF"; serumTag="SPF required after"; }
    else{ serumName="Hyaluronic Acid Serum"; serumDetail="Hydrating HA serum — universal safe default."; serumWhy="No specific active concern — HA provides universal hydration benefit."; serumGlance="Hyaluronic Acid"; }
    addStep({name:serumName,detail:serumDetail,why:serumWhy,glance:serumGlance,tag:serumTag});
    if(serumName==="Retinol Serum"){
      addStep({name:"SPF Application",detail:"Apply broad-spectrum SPF 30+ on backs of hands after retinol. Mandatory — retinol increases photosensitivity.",why:"Retinol accelerates cell turnover and increases UV sensitivity — SPF is non-negotiable.",glance:"SPF 30+",tag:"Mandatory with Retinol"});
    }
  }

  // MASK OR PARAFFIN — either/or client choice (Edit & Ceremony only)
  if(tier2){
    var thermalName, thermalDetail, thermalGlance, thermalWhy, thermalTag=null;

    if(noHeat){
      // Paraffin contraindicated — mask only
      if(editMani){ thermalName="Hydrating Hand Mask"; thermalDetail="Hydrating mask with cling wrap and mitts — 15 minutes. Paraffin bath not suitable (isotretinoin or no-heat preference)."; thermalGlance="Hydrating Mask — 15 min"; }
      else{ thermalName="Urea, Beeswax & Honey Foot Mask"; thermalDetail="Soothing mask with urea, beeswax and honey — 15 minutes. Paraffin bath not suitable (isotretinoin or no-heat preference)."; thermalGlance="Foot Mask — 15 min"; }
      thermalWhy="Paraffin produces high localised heat which is contraindicated — mask delivers moisture safely.";
      thermalTag="Paraffin replaced by mask";
    } else if(isDiab){
      if(editMani){ thermalName="Hydrating Hand Mask"; thermalDetail="Hydrating mask with cling wrap and mitts — 15 minutes. Paraffin bath not recommended for diabetic clients."; thermalGlance="Hydrating Mask — 15 min"; }
      else{ thermalName="Urea, Beeswax & Honey Foot Mask"; thermalDetail="Soothing mask with urea, beeswax and honey — 15 minutes. Paraffin bath not recommended for diabetic clients."; thermalGlance="Foot Mask — 15 min"; }
      thermalWhy="Diabetic clients have impaired heat sensation — paraffin immersion risks undetected thermal injury. Mask is the safe alternative.";
      thermalTag="Paraffin replaced — diabetic";
    } else if(isPreg){
      if(editMani){ thermalName="Hydrating Hand Mask"; thermalDetail="Hydrating mask with cling wrap and mitts — 15 minutes. Paraffin bath avoided during pregnancy."; thermalGlance="Hydrating Mask — 15 min"; }
      else{ thermalName="Urea, Beeswax & Honey Foot Mask"; thermalDetail="Soothing mask with urea, beeswax and honey — 15 minutes. Paraffin bath avoided during pregnancy."; thermalGlance="Foot Mask — 15 min"; }
      thermalWhy="High heat from paraffin is avoided during pregnancy. Mask delivers intensive moisture safely.";
      thermalTag="Paraffin replaced — pregnancy";
    } else if(sf==="hydration"||isPeri||sf==="cracked_heels"){
      // Recommend paraffin but offer mask as alternative
      if(editMani){ thermalName="Lavender Paraffin Bath (recommended) or Hydrating Hand Mask"; thermalDetail="Paraffin Bath recommended — 15 minutes of deep occlusive moisture. Double-dip for best results. If client prefers: Hydrating Hand Mask with cling wrap and mitts — 15 minutes."; thermalGlance="Paraffin recommended — or Mask"; }

  var massageName=mani?(tier2?"Palm and Forearm Massage":"Palm Massage"):(tier2?"Foot and Calf Massage":"Foot Massage");

  }
  addStep({name:massageName,detail:massageDetail,why:massageWhy,glance:massageGlance,tag:isPreg?"Modified for pregnancy":null});

  if(mani){

  if(nutAllerg) creamDetail+=" Confirm no nut-derived oils before applying.";

  // AROMATHERAPY
  var aromaName,aromaDetail,aromaWhy,aromaGlance,aromaTag=null;
  if(fragSens){ aromaName="Aromatherapy"; aromaDetail="Not Recommended — client has fragrance sensitivity. Do not add essential oils to the cream."; aromaWhy="Essential oils risk triggering a reactive response in fragrance-sensitive clients."; aromaGlance="Not recommended"; aromaTag="Not recommended"; }

  else{ finishDetail="Client choice — Gel Polish, BIAB, Hard Gel, or Simple Polish. All suitable."; finishWhy="Nails in good condition — any finish is appropriate."; finishGlance="Client choice"; }

  // PROTOCOLS
  if(isDiab)        protocols.push("Diabetic-Safe");
  if(isIsot)        protocols.push("Isotretinoin-Safe");
  if(isPreg)        protocols.push("Pregnancy Protocol");
  if(fragSens)      protocols.push("Fragrance-Free");
  if(noHeat&&!isIsot) protocols.push("No Heat");
  if(nc==="fungal") protocols.push("Infection Control");

  // NOTES
  if(isDiab)  notes.push("Diabetic protocol — no blade on feet, careful heat monitoring, no cutting near skin folds.");
  if(isIsot)  notes.push("Client on isotretinoin — no paraffin, no aggressive exfoliation, no essential oils.");

  if((nc==="brittle"||nc==="soft")&&nc!=="fungal") notes.push("Discuss BIAB overlay with client — long-term nail health benefit over standard gel.");
  if(editMani&&sf==="antiaging"&&!isPeri&&!isIsot&&!isPreg) notes.push("Retinol serum applied — SPF mandatory on backs of hands before client leaves.");

  return {steps:steps, glance:glance, notes:notes, protocols:protocols};
}

// ── GOOGLE SHEETS ──────────────────────────────────────────────────
function saveToSheets(rec){
  if(!SHEETS_URL||SHEETS_URL==="https://script.google.com/macros/s/AKfycbzmVlKz2iTixRiMqPUXQriTxODfcVOU-PokH231I0G42DX_VaAS1m0I36SpN6pxVHRbdg/exec") return;
  var a=S.answers;
  var allTreatments=S.selectedTreatments&&S.selectedTreatments.length?S.selectedTreatments:[S.treatment];
  var treatmentName=allTreatments.map(function(k){ return TREATMENTS[k]?TREATMENTS[k].name:""; }).join(" + ");
  var skins=Array.isArray(a.skin_focus_all)?a.skin_focus_all:(a.skin_focus?[a.skin_focus]:[]);
  var nails=Array.isArray(a.nail_condition_all)?a.nail_condition_all:(a.nail_condition?[a.nail_condition]:[]);
  var payload={
    timestamp:      new Date().toLocaleString("nl-NL",{timeZone:"Europe/Amsterdam"}),
    treatment:      treatmentName,
    skin:           skins.join(", ")||"None",
    nails:          nails.join(", ")||"None",
    health_flags:   (a.health_flags||[]).join(", ")||"None",
    hormonal:       a.hormonal||"-",
    recommended:    rec.steps.map(function(s){return s.name;}).join(" · "),
    steps_json:     JSON.stringify(rec.steps),
    glance_json:    JSON.stringify(rec.glance),
    protocols:      rec.protocols.join(", ")||"None",
    therapist_notes:rec.notes.join(" | ")||"None",
    agreed:         S.agreed?"Yes":"No",
    alt_path:       S.altPath||"",
    consent:        S.consent?"Yes":"No",
    source:         S.fromPending?"client_form":"staff_entry"
  };
  fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
    .then(function(){S.saveStatus="saved";render();})
    .catch(function(){S.saveStatus="error";render();});
  // Save to local plans with name (staff tool only)
  var plans=JSON.parse(localStorage.getItem(PLANS_KEY)||"[]");
  var planEntry=Object.assign({},payload,{
    client_name: S.clientName,
    client_dob:  S.fromPending&&S.fromPending.client_dob?S.fromPending.client_dob:"",
    id: "p_"+Date.now(),
    expires: S.consent?null:Date.now()+(24*60*60*1000),
    consent: S.consent
  });
  plans.unshift(planEntry);
  localStorage.setItem(PLANS_KEY,JSON.stringify(sortPlans(plans)));
}

function sortPlans(arr){
  return arr.slice().sort(function(a,b){
    return String(b.timestamp||"").localeCompare(String(a.timestamp||""));
  });
}

// ── CONSULTATION HANDLERS ───────────────────────────────────────────
function selectTreatment(key){ S.treatment=key; S.currentQ=0; S.history=[]; S.answers={}; render(); }

function handleSingle(value){
  var q=QUESTIONS[S.currentQ];
  S.answers[q.id]=value;
  S.history.push(S.currentQ); S.currentQ++;
  if(S.currentQ>=QUESTIONS.length){ S.done=true; }
  render();
}

function handleMultiToggle(value){
  if(value==="none"){ S.multiSelected=["none"]; }
  else{ var w=S.multiSelected.filter(function(v){return v!=="none";}); S.multiSelected=S.multiSelected.indexOf(value)>=0?w.filter(function(v){return v!==value;}):w.concat([value]); }
  render();
}

function handleMultiContinue(){
  if(!S.multiSelected.length) return;
  var q=QUESTIONS[S.currentQ];
  S.answers[q.id]=S.multiSelected[0]; // primary
  S.answers[q.id+"_all"]=S.multiSelected.slice(); // all selected
  S.history.push(S.currentQ); S.currentQ++; S.multiSelected=[];
  if(S.currentQ>=QUESTIONS.length){ S.done=true; }
  render();
}

function handleBack(){
  if(S.done){ S.done=false; S.agreed=null; S.altPath=""; S.saveStatus="idle"; S.currentQ=QUESTIONS.length-1; return render(); }
  if(S.currentQ===0){ S.treatment=null; return render(); }
  var prev=S.history.pop();
  var q=QUESTIONS[prev];
  S.multiSelected=(q&&q.type==="multi")?(S.answers[q.id+"_all"]||[]):[];
  S.currentQ=prev; render();
}

function handleRestart(){
  S.clientName=""; S.treatment=null; S.selectedTreatments=[]; S.answers={}; S.history=[];
  S.currentQ=0; S.multiSelected=[]; S.done=false;
  S.agreed=null; S.altPath=""; S.saveStatus="idle"; S.fromPending=null; S.consent=true;
  checkPending();
  render();
}

// ── DOM HELPER ──────────────────────────────────────────────────────
function el(tag,attrs){
  var e=document.createElement(tag);
  var children=Array.prototype.slice.call(arguments,2);
  if(attrs){ Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==="class") e.className=v;
    else if(k==="style") e.style.cssText=v;
    else if(k.indexOf("on")===0) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }); }
  children.forEach(function(c){ if(c==null) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}

// ── RENDER ──────────────────────────────────────────────────────────
function render(){
  if(!isAuth()) return;
  var main=document.getElementById("main");
  main.innerHTML="";
  if(S.tab==="checkin"){ main.appendChild(renderCheckin()); return; }
  if(S.tab==="plans"){ main.appendChild(renderPlans()); return; }
  var total=QUESTIONS.length+1;
  var cur=S.done?total:S.treatment?S.currentQ+1:0;
  document.getElementById("progress").style.width=(cur/total*100)+"%";
  if(!S.treatment){ main.appendChild(renderSelect()); return; }
  if(S.done){ document.getElementById("pending-area").innerHTML=""; renderResults(main); return; }
  main.appendChild(renderQuestion());
}

    rec.steps.forEach(function(s,i){
      var item=el("div",{"class":"step-item"},el("div",{"class":"step-num"},String(i+1)));
      var content=el("div",{"class":"step-body"},el("div",{"class":"step-name"},s.name),el("div",{"class":"step-detail"},s.detail));
      if(s.tag) content.appendChild(el("div",{"class":"step-tag"+(s.ts==="s"?" s":"")},s.tag));
      if(s.why) content.appendChild(el("div",{"class":"step-why"},"Why: "+s.why));
      item.appendChild(content); stepsEl.appendChild(item);
    });
    body.appendChild(stepsEl);

    if(rec.protocols.length){
      body.appendChild(el("div",{"class":"sec-lbl"},"Applied Protocols"));
      var pb=el("div",{"class":"protocols"});
      rec.protocols.forEach(function(p){ pb.appendChild(el("div",{"class":"badge"},p)); });
      body.appendChild(pb);
    }
    if(rec.notes.length){
      var nb=el("div",{"class":"notes-box"});
      nb.appendChild(el("div",{"class":"notes-lbl"},"Therapist Notes"));
      rec.notes.forEach(function(n){ nb.appendChild(el("div",{"class":"note-item"},el("span",{},"→"),n)); });
      body.appendChild(nb);
    }

    // Agreement only on last card
    if(idx===allTreatments.length-1){
      body.appendChild(renderAgreement(allRecs));
    }

    resCard.appendChild(body);
    wrap.appendChild(resCard);
  });

  // Restore S.treatment to first selected
  S.treatment=allTreatments[0];
  main.appendChild(wrap);
}

function buildAllRecs(){
  var allTreatments=S.selectedTreatments&&S.selectedTreatments.length?S.selectedTreatments:[S.treatment];
  var combined={steps:[],glance:[],notes:[],protocols:[]};
  allTreatments.forEach(function(tKey){
    S.treatment=tKey;
    var rec=buildRec();
    combined.steps=combined.steps.concat(rec.steps);
    combined.glance=combined.glance.concat(rec.glance);
    rec.notes.forEach(function(n){ if(combined.notes.indexOf(n)<0) combined.notes.push(n); });
    rec.protocols.forEach(function(p){ if(combined.protocols.indexOf(p)<0) combined.protocols.push(p); });
  });
  S.treatment=allTreatments[0];
  return combined;
}

function renderAgreement(allRecs){
  var rec=buildAllRecs();
  var sec=el("div",{"class":"agree-sec"});
  sec.appendChild(el("div",{"class":"agree-q"},"Does the client agree with this plan?"));
  if(!S.consent){
    sec.appendChild(el("div",{"class":"badge","style":"margin-bottom:14px;background:#FEF3E2;color:var(--suede)"},"Client did not consent to storing this plan — auto-deletes in 24 hours"));
  }
  if(S.agreed===null){
    var btns=el("div",{"class":"agree-btns"});
    btns.appendChild(el("button",{"class":"agree-btn yes","onClick":function(){ S.agreed=true; S.saveStatus="saving"; saveToSheets(buildAllRecs()); render(); }},"✓  Yes, proceed"));
    btns.appendChild(el("button",{"class":"agree-btn no","onClick":function(){ S.agreed=false; render(); }},"✗  No, adjust"));
    sec.appendChild(btns);
  } else if(S.agreed===true){
    var sm={"saving":{cls:"saving",icon:"⏳",text:"Saving plan…"},"saved":{cls:"saved",icon:"✓",text:"Plan saved"},"error":{cls:"error",icon:"⚠",text:"Could not save — check connection"}};
    var sv=sm[S.saveStatus]; if(sv) sec.appendChild(el("div",{"class":"save-status "+sv.cls},sv.icon+"  "+sv.text));
    sec.appendChild(el("button",{"class":"restart-btn","onClick":handleRestart},"New Client ↺"));
  } else {
    sec.appendChild(el("div",{"class":"alt-lbl"},"Describe the adjusted treatment:"));
    var ta=document.createElement("textarea");
    ta.className="alt-input"; ta.placeholder="Notes on adjusted path…"; ta.setAttribute("rows","3"); ta.value=S.altPath;
    ta.addEventListener("input",function(e){S.altPath=e.target.value;});
    sec.appendChild(ta);
    var saveBtn=el("button",{"class":"save-plan-btn","onClick":function(){ if(!S.altPath.trim()) return; S.saveStatus="saving"; saveToSheets(buildAllRecs()); render(); }},"Save Adjusted Plan");
    if(S.saveStatus==="saving"||S.saveStatus==="saved") saveBtn.setAttribute("disabled","true");
    sec.appendChild(saveBtn);
    var sm2={"saving":{cls:"saving",icon:"⏳",text:"Saving…"},"saved":{cls:"saved",icon:"✓",text:"Saved"},"error":{cls:"error",icon:"⚠",text:"Could not save"}};
    var sv2=sm2[S.saveStatus]; if(sv2) sec.appendChild(el("div",{"class":"save-status "+sv2.cls},sv2.icon+"  "+sv2.text));
    if(S.saveStatus==="saved") sec.appendChild(el("button",{"class":"restart-btn","style":"margin-top:10px","onClick":handleRestart},"New Client ↺"));
  }
  return sec;
}

// PLANS TAB
function renderPlans(){
  loadPlans();
  var hidden=getHidden();
  var wrap=el("div",{"class":"plans-wrap"});
  var toolbar=el("div",{"class":"plans-toolbar"});
  toolbar.appendChild(el("div",{"class":"plans-title"},"Treatment Plans"));
  toolbar.appendChild(el("button",{"class":"refresh-btn","onClick":function(){ loadPlans(); render(); }},"↺ Refresh"));
  wrap.appendChild(toolbar);
  var sw=el("div",{"class":"plans-search-wrap"});
  sw.appendChild(el("span",{"class":"plans-search-icon"},"🔍"));
  var si=el("input",{"class":"plans-search","type":"text","placeholder":"Search by client name…","value":S.plansSearch});
  si.addEventListener("input",function(e){ S.plansSearch=e.target.value; S.plansPage=0; updatePlansList(wrap,hidden); });
  sw.appendChild(si); wrap.appendChild(sw);
  updatePlansList(wrap,hidden);
  return wrap;
}

function updatePlansList(wrap,hidden){
  var PAGE_SIZE=10;
  ["plans-count","plans-list","plans-empty","pagination"].forEach(function(cls){ var e=wrap.querySelector("."+cls); if(e) e.parentNode.removeChild(e); });
  var query=S.plansSearch.toLowerCase().trim();
  var filtered=S.plans.filter(function(p){
    var ts=String(p.timestamp||"");
    if(hidden.indexOf(ts)>=0) return false;
    if(!query) return true;
    return String(p.client_name||"").toLowerCase().indexOf(query)>=0||String(p.treatment||"").toLowerCase().indexOf(query)>=0;
  });
  var total=S.plans.filter(function(p){ return hidden.indexOf(String(p.timestamp||""))<0; }).length;
  var pages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  var page=Math.min(S.plansPage,pages-1);
  var pageItems=filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  wrap.appendChild(el("div",{"class":"plans-count"},query?filtered.length+" of "+total+" plans match":total+" plan"+(total===1?"":"s")+" saved"));
  if(!filtered.length){ wrap.appendChild(el("div",{"class":"plans-empty"},query?"No plans match \""+S.plansSearch+"\".":"No plans saved yet.")); return; }
  var list=el("div",{"class":"plans-list"});
  pageItems.forEach(function(p){
    var name=p.client_name||"Unknown";
    var treatment=p.treatment||"—";
    var ts=String(p.timestamp||"");
    var dateOnly=ts.split(",")[0]||ts;
    var noConsent=!p.consent;
    var isPending=S.pendingDelete===ts;
    var step1="";
    try{ var ps=JSON.parse(p.steps_json||"[]"); if(ps.length) step1=ps[0].name+(ps[0].glance&&ps[0].glance!==ps[0].name?" — "+ps[0].glance:""); }catch(e){}
    var row=el("div",{"class":"plan-row"+(noConsent?" no-consent":"")});
    row.appendChild(el("div",{"class":"plan-dot"+(noConsent?" expiring":"")}));
    (function(plan){ row.appendChild(el("div",{"class":"plan-info","onClick":function(){openModal(plan);}},
      el("div",{"class":"plan-name"},name,noConsent?el("span",{"class":"no-consent-badge"},"Auto-delete 24h"):null),
      el("div",{"class":"plan-meta"},step1||treatment),
      el("div",{"class":"plan-date"},dateOnly))); })(p);
    (function(plan){ row.appendChild(el("button",{"class":"plan-open-btn","onClick":function(){openModal(plan);}},"›")); })(p);
    if(!isPending){
      (function(t){ row.appendChild(el("button",{"class":"plan-del-btn","onClick":function(e){ e.stopPropagation(); S.pendingDelete=t; updatePlansList(wrap,hidden); }},"Delete")); })(ts);
    } else {
      var conf=el("div",{"class":"del-confirm"});
      conf.appendChild(el("span",{"class":"del-confirm-txt"},"Remove?"));
      (function(t){ conf.appendChild(el("button",{"class":"del-yes-btn","onClick":function(e){ e.stopPropagation(); hideplan(t); S.pendingDelete=null; S.plans=S.plans.filter(function(p){ return String(p.timestamp||"")!==t; }); updatePlansList(wrap,hidden); }},"Yes")); })(ts);
      conf.appendChild(el("button",{"class":"del-no-btn","onClick":function(e){ e.stopPropagation(); S.pendingDelete=null; updatePlansList(wrap,hidden); }},"Cancel"));
      row.appendChild(conf);
    }
    list.appendChild(row);
  });
  wrap.appendChild(list);
  if(pages>1){
    var pag=el("div",{"class":"pagination"});
    var prevBtn=el("button",{"class":"page-btn","onClick":function(){ S.plansPage=page-1; updatePlansList(wrap,hidden); }},"← Prev");
    if(page===0) prevBtn.setAttribute("disabled","true");
    pag.appendChild(prevBtn);
    pag.appendChild(el("div",{"class":"page-info"},"Page "+(page+1)+" of "+pages));
    var nextBtn=el("button",{"class":"page-btn","onClick":function(){ S.plansPage=page+1; updatePlansList(wrap,hidden); }},"Next →");
    if(page>=pages-1) nextBtn.setAttribute("disabled","true");
    pag.appendChild(nextBtn);
    wrap.appendChild(pag);
  }
}

function openModal(plan){ renderModal(plan); }
function closeModal(){ document.getElementById("modal-root").innerHTML=""; }

function renderModal(p){
  var root=document.getElementById("modal-root"); root.innerHTML="";
  var name=p.client_name||"Client", treatment=p.treatment||"—", time=p.timestamp||"—";
  var protocols=p.protocols||"", notes_=p.therapist_notes||"", agreed=p.agreed||"", altPath=p.alt_path||"";
  var stepsJson=p.steps_json||"", glanceJson=p.glance_json||"";
  var noConsent=!p.consent;
  var overlay=el("div",{"class":"modal-overlay","onClick":function(e){if(e.target===overlay)closeModal();}});
  var card=el("div",{"class":"modal-card"});
  var hdr=el("div",{"class":"modal-hdr"});
  hdr.appendChild(el("div",{"class":"modal-hdr-text"},
    el("div",{"class":"modal-tier"},treatment+" · "+time.split(",")[0]),
    el("div",{"class":"modal-tname"},name),
    el("div",{"class":"modal-client"},(p.client_dob?"DOB: "+p.client_dob+" · ":"")+(noConsent?"No consent — auto-deletes in 24h":"Plan stored with consent"))));
  hdr.appendChild(el("button",{"class":"modal-close","onClick":closeModal},"×"));
  card.appendChild(hdr);
  var body=el("div",{"class":"modal-body"});
  if(agreed){ body.appendChild(el("div",{"class":"modal-agree "+(agreed.toLowerCase()==="yes"?"yes":"no")},agreed.toLowerCase()==="yes"?"✓ Client agreed":"✗ Client adjusted plan")); }
  if(altPath){ var nb=el("div",{"class":"notes-box","style":"margin-bottom:14px"}); nb.appendChild(el("div",{"class":"notes-lbl"},"Adjusted Path")); nb.appendChild(el("div",{"class":"note-item"},el("span",{},"→"),altPath)); body.appendChild(nb); }

  // At a Glance in modal
  var parsedGlance=[]; try{ parsedGlance=JSON.parse(glanceJson); }catch(e){}
  if(parsedGlance.length){
    var gb=el("div",{"class":"glance-box","style":"margin-bottom:18px"}); gb.appendChild(el("div",{"class":"sec-lbl"},"At a Glance"));
    var gi=el("div",{"class":"glance-items"});
    parsedGlance.forEach(function(g){ gi.appendChild(el("div",{"class":"glance-item"},g.label,el("span",{},g.value!==g.label?"— "+g.value:""))); });
    gb.appendChild(gi); body.appendChild(gb);
  }

  // Steps
  var parsedSteps=[]; try{ parsedSteps=JSON.parse(stepsJson); }catch(e){}
  if(parsedSteps.length){
    body.appendChild(el("div",{"class":"sec-lbl","style":"margin-bottom:10px"},"Detailed Steps"));
    var stepsEl=el("div",{"class":"steps"});
    parsedSteps.forEach(function(s,i){
      var item=el("div",{"class":"step-item"},el("div",{"class":"step-num"},String(i+1)));
      var content=el("div",{"class":"step-body"},el("div",{"class":"step-name"},s.name||""),el("div",{"class":"step-detail"},s.detail||""));
      if(s.tag) content.appendChild(el("div",{"class":"step-tag"+(s.ts==="s"?" s":"")},s.tag));
      if(s.why) content.appendChild(el("div",{"class":"step-why"},"Why: "+s.why));
      item.appendChild(content); stepsEl.appendChild(item);
    });
    body.appendChild(stepsEl);
  }
  if(protocols&&protocols!=="None"){ var pb=el("div",{"class":"protocols","style":"margin-top:12px"}); protocols.split(",").forEach(function(p2){ if(p2.trim()) pb.appendChild(el("div",{"class":"badge"},p2.trim())); }); body.appendChild(pb); }
  if(notes_&&notes_!=="None"){ var nb3=el("div",{"class":"notes-box","style":"margin-top:12px"}); nb3.appendChild(el("div",{"class":"notes-lbl"},"Therapist Notes")); notes_.split("|").forEach(function(n){ if(n.trim()) nb3.appendChild(el("div",{"class":"note-item"},el("span",{},"→"),n.trim())); }); body.appendChild(nb3); }
  card.appendChild(body); overlay.appendChild(card); root.appendChild(overlay);
}

// Poll for new pending forms every 30 seconds
setInterval(function(){ if(typeof S!=="undefined"&&isAuth()){ pollSheets(); } },30000);
// Also poll on load
if(isAuth()){ cleanExpiredPlans(); checkPending(); pollSheets(); }

if(isAuth()) render();
</script>
