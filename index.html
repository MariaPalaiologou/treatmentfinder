<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Treatment Guide — Nail &amp; Muse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --burg:#470B14;--burg-mid:#6B1420;--burg-light:#F2E8EA;--burg-pale:#FAF5F6;
      --suede:#AD7957;--suede-light:#F5EDE4;--warm-grey:#E3DDD5;
      --charcoal:#373636;--mid:#5A5555;--gray:#9A9494;--border:#DDD5CE;
    }
    html,body{min-height:100%;background:#F7F4F1;font-family:'Poppins',sans-serif;color:var(--charcoal)}

    /* LOCK */
    #lock-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FAF5F6 0%,#F2E8EA 50%,#EDE0D8 100%)}
    .lock-card{background:white;border-radius:20px;box-shadow:0 8px 48px rgba(71,11,20,.10);padding:48px 44px;width:100%;max-width:420px;text-align:center;animation:fadeUp .4s ease both}
    .logo-img{width:200px;max-width:100%;height:auto;margin:0 auto 24px;display:block}
    .lock-div{width:40px;height:1px;background:var(--suede);margin:0 auto 24px}
    .lock-card h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;color:var(--charcoal);margin-bottom:8px}
    .lock-card h2 em{font-style:italic;color:var(--burg)}
    .lock-card p{font-size:12px;color:var(--gray);font-weight:300;margin-bottom:32px;line-height:1.6}
    .lock-input{width:100%;padding:13px 18px;border:1.5px solid var(--border);border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;color:var(--charcoal);outline:none;transition:border-color .2s;margin-bottom:12px;letter-spacing:3px;text-align:center;background:var(--burg-pale)}
    .lock-input:focus{border-color:var(--burg);background:white}
    .lock-input.err{border-color:#C0392B;animation:shake .3s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .lock-btn{width:100%;padding:13px;background:var(--burg);color:white;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s}
    .lock-btn:hover{background:var(--burg-mid)}
    .lock-err{font-size:12px;color:#C0392B;margin-top:10px;height:16px}

    /* APP */
    #app{display:none}
    .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:44px 20px 100px;background:linear-gradient(160deg,#FAF5F6 0%,#F2E8EA 40%,#EDE0D8 100%);background-attachment:fixed}

    /* HEADER */
    .header{text-align:center;margin-bottom:32px}
    .header-logo{width:180px;max-width:100%;height:auto;margin:0 auto 16px;display:block}
    .header-div{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--suede),transparent);margin:0 auto 14px}
    .header-sub{font-size:12px;font-weight:300;color:var(--gray);line-height:1.6}

    /* TAB BAR */
    .tab-bar{display:flex;gap:0;margin-bottom:32px;background:white;border-radius:12px;padding:4px;box-shadow:0 2px 16px rgba(71,11,20,.06);width:100%;max-width:580px}
    .tab-btn{flex:1;padding:11px;border:none;background:transparent;font-family:'Poppins',sans-serif;font-size:11px;font-weight:400;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:9px;transition:all .2s}
    .tab-btn.active{background:var(--burg);color:white;font-weight:500}

    /* PROGRESS */
    .prog-wrap{width:100%;max-width:580px;margin-bottom:32px}
    .prog-bar{height:2px;background:var(--warm-grey);border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--burg),var(--suede));border-radius:2px;transition:width .5s ease}

    /* CARD */
    .card{background:white;border-radius:20px;box-shadow:0 4px 40px rgba(71,11,20,.07),0 1px 8px rgba(0,0,0,.03);padding:40px 44px;width:100%;max-width:580px;animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .back-btn{background:none;border:none;color:var(--gray);font-family:'Poppins',sans-serif;font-size:11px;cursor:pointer;margin-bottom:20px;padding:0;display:flex;align-items:center;gap:5px;letter-spacing:.5px;transition:color .15s}
    .back-btn:hover{color:var(--burg)}
    .step-lbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:10px}
    .question{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;color:var(--charcoal);line-height:1.3;margin-bottom:8px}
    .q-note{font-size:12px;color:var(--gray);font-weight:300;margin-bottom:24px;line-height:1.6}

    /* CLIENT NAME */
    .cname-wrap{margin-bottom:24px}
    .cname-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:7px}
    .cname-input{width:100%;padding:11px 15px;border:1.5px solid var(--border);border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;color:var(--charcoal);outline:none;transition:border-color .2s;background:var(--burg-pale)}
    .cname-input:focus{border-color:var(--burg);background:white}

    /* TREATMENT TILES */
    .t-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .t-tile{border:1.5px solid var(--border);border-radius:14px;padding:20px 14px;cursor:pointer;transition:all .2s;text-align:center;background:white}
    .t-tile:hover{border-color:var(--burg);background:var(--burg-pale);transform:translateY(-2px);box-shadow:0 4px 16px rgba(71,11,20,.08)}
    .t-tier{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:5px}
    .t-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:var(--charcoal);line-height:1.3;margin-bottom:7px}
    .t-inc{font-size:10px;color:var(--gray);font-weight:300;line-height:1.5}
    .t-icon{font-size:20px;margin-bottom:9px}

    /* OPTIONS */
    .options{display:flex;flex-direction:column;gap:9px}
    .opt-btn{display:flex;align-items:center;gap:13px;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;background:white;cursor:pointer;text-align:left;transition:all .18s;width:100%;font-family:'Poppins',sans-serif}
    .opt-btn:hover{border-color:var(--burg);background:var(--burg-pale);transform:translateX(3px)}
    .opt-icon{font-size:16px;width:36px;height:36px;background:var(--burg-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .opt-text{flex:1}
    .opt-title{font-size:13px;font-weight:500;color:var(--charcoal);line-height:1.2}
    .opt-sub{font-size:11px;color:var(--gray);font-weight:300;margin-top:2px;line-height:1.4}
    .opt-arr{color:var(--border);font-size:13px}
    .multi-hint{font-size:11px;color:var(--suede);font-weight:300;margin-bottom:13px}
    .multi-opt{display:flex;align-items:center;gap:13px;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;background:white;cursor:pointer;transition:all .18s;user-select:none}
    .multi-opt:hover{border-color:var(--burg);background:var(--burg-pale)}
    .multi-opt.checked{border-color:var(--burg);background:var(--burg-light)}
    .chk{width:19px;height:19px;border:1.5px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:white;transition:all .15s}
    .multi-opt.checked .chk{background:var(--burg);border-color:var(--burg)}
    .cont-btn{margin-top:18px;width:100%;padding:13px;background:var(--burg);color:white;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s}
    .cont-btn:hover{background:var(--burg-mid);transform:translateY(-1px)}
    .cont-btn:disabled{background:#ccc;cursor:default;transform:none}

    /* RESULT */
    .res-card{background:white;border-radius:20px;box-shadow:0 4px 40px rgba(71,11,20,.09);width:100%;max-width:620px;overflow:hidden;animation:fadeUp .4s ease both}
    .res-hdr{background:var(--burg);padding:36px 44px;color:white;position:relative;overflow:hidden}
    .res-hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04)}
    .res-tier{font-size:9px;letter-spacing:4px;text-transform:uppercase;opacity:.7;margin-bottom:8px;font-weight:400}
    .res-name{font-family:'Playfair Display',serif;font-size:30px;font-weight:400;line-height:1.2;margin-bottom:5px}
    .res-client{font-size:13px;opacity:.8;font-weight:300}
    .res-body{padding:36px 44px}
    .sec-lbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--suede);font-weight:500;margin-bottom:14px}

    /* STEPS */
    .steps{margin-bottom:24px}
    .step-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #F5F0EE}
    .step-item:last-child{border-bottom:none}
    .step-num{width:24px;height:24px;background:var(--burg-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:500;color:var(--burg);margin-top:1px}
    .step-body{flex:1}
    .step-name{font-size:13px;font-weight:500;color:var(--charcoal);line-height:1.3}
    .step-detail{font-size:12px;color:var(--gray);font-weight:300;margin-top:3px;line-height:1.55}
    .step-tag{display:inline-block;font-size:10px;background:var(--burg-light);color:var(--burg);padding:2px 10px;border-radius:20px;margin-top:5px;font-weight:500}
    .step-tag.s{background:var(--suede-light);color:var(--suede)}

    /* PROTOCOLS / NOTES */
    .protocols{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
    .badge{background:var(--burg-light);color:var(--burg);font-size:10px;font-weight:500;padding:4px 13px;border-radius:20px}
    .notes-box{background:#FBF8F3;border:1px solid #E8DFCC;border-radius:12px;padding:16px 18px;margin-bottom:20px}
    .notes-lbl{font-size:9px;letter-spacing:3px;color:var(--suede);font-weight:500;margin-bottom:9px;text-transform:uppercase}
    .note-item{font-size:12px;color:#7A6340;line-height:1.6;padding:3px 0;display:flex;gap:8px}

    /* AGREEMENT */
    .agree-sec{border-top:1px solid #F0EAE8;padding-top:24px;margin-top:4px}
    .agree-q{font-family:'Playfair Display',serif;font-size:18px;color:var(--charcoal);margin-bottom:16px;line-height:1.3}
    .agree-btns{display:flex;gap:10px;margin-bottom:16px}
    .agree-btn{flex:1;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;background:white;color:var(--charcoal);letter-spacing:1px}
    .agree-btn.yes.on{background:#2D7A4F;border-color:#2D7A4F;color:white}
    .agree-btn.no.on{background:var(--charcoal);border-color:var(--charcoal);color:white}
    .alt-lbl{font-size:11px;color:var(--mid);margin-bottom:8px;font-weight:400}
    .alt-input{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:10px;font-family:'Poppins',sans-serif;font-size:13px;color:var(--charcoal);outline:none;resize:vertical;min-height:80px;transition:border-color .2s;background:var(--burg-pale)}
    .alt-input:focus{border-color:var(--burg);background:white}
    .save-plan-btn{margin-top:12px;width:100%;padding:13px;background:var(--burg);color:white;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s}
    .save-plan-btn:hover{background:var(--burg-mid)}
    .save-plan-btn:disabled{background:#ccc;cursor:default}
    .save-status{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;padding:11px;border-radius:10px;margin-top:12px}
    .save-status.saving{background:#FBF8F3;color:var(--suede)}
    .save-status.saved{background:#F0FFF4;color:#2D7A4F}
    .save-status.error{background:#FFF0F0;color:#C0392B}
    .restart-btn{margin-top:12px;width:100%;padding:13px;background:transparent;color:var(--burg);border:1.5px solid var(--burg);border-radius:10px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s}
    .restart-btn:hover{background:var(--burg-light)}
    .ornament{text-align:center;color:var(--suede);font-size:16px;letter-spacing:10px;margin:24px 0 44px;opacity:.35;font-family:'Playfair Display',serif}

    /* PLANS TAB */
    .plans-wrap{width:100%;max-width:580px}
    .plans-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .plans-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--charcoal)}
    .refresh-btn{background:transparent;border:1.5px solid var(--border);color:var(--mid);font-family:'Poppins',sans-serif;font-size:10px;font-weight:400;letter-spacing:1px;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .18s}
    .refresh-btn:hover{border-color:var(--burg);color:var(--burg)}
    .plans-list{display:flex;flex-direction:column;gap:9px}

    /* PLAN ROW — with delete */
    .plan-row{background:white;border-radius:14px;padding:14px 16px;box-shadow:0 2px 12px rgba(71,11,20,.05);border:1.5px solid transparent;display:flex;align-items:center;gap:12px;transition:border-color .18s}
    .plan-row:hover{border-color:var(--border)}
    .plan-dot{width:8px;height:8px;background:var(--burg);border-radius:50%;flex-shrink:0}
    .plan-info{flex:1;cursor:pointer;min-width:0}
    .plan-info:hover .plan-name{color:var(--burg)}
    .plan-name{font-size:14px;font-weight:500;color:var(--charcoal);transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-meta{font-size:11px;color:var(--gray);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-open-btn{background:transparent;border:none;color:var(--gray);font-size:16px;cursor:pointer;padding:4px 6px;transition:color .15s;flex-shrink:0}
    .plan-open-btn:hover{color:var(--burg)}
    .plan-del-btn{background:transparent;border:1.5px solid #EECECE;color:#C0392B;font-family:'Poppins',sans-serif;font-size:10px;font-weight:500;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .18s;flex-shrink:0;letter-spacing:.5px}
    .plan-del-btn:hover{background:#FFF0F0;border-color:#C0392B}

    /* DELETE CONFIRM inline */
    .del-confirm{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .del-confirm-txt{font-size:11px;color:#C0392B;font-weight:400}
    .del-yes-btn{background:#C0392B;border:none;color:white;font-family:'Poppins',sans-serif;font-size:10px;font-weight:500;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .18s}
    .del-yes-btn:hover{background:#A93226}
    .del-no-btn{background:transparent;border:1.5px solid var(--border);color:var(--mid);font-family:'Poppins',sans-serif;font-size:10px;font-weight:400;padding:5px 10px;border-radius:8px;cursor:pointer;transition:all .18s}
    .del-no-btn:hover{border-color:var(--charcoal);color:var(--charcoal)}

    .plans-empty{text-align:center;padding:60px 20px;color:var(--gray);font-size:13px;font-weight:300;line-height:1.8}
    .plans-loading{text-align:center;padding:60px 20px;color:var(--suede);font-size:13px}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(55,54,54,.72);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-card{background:white;border-radius:20px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .modal-hdr{background:var(--burg);padding:26px 32px;color:white;position:sticky;top:0;display:flex;justify-content:space-between;align-items:flex-start;border-radius:20px 20px 0 0;z-index:1}
    .modal-hdr-text{flex:1}
    .modal-tier{font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:6px}
    .modal-tname{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;line-height:1.2;margin-bottom:4px}
    .modal-client{font-size:12px;opacity:.8;font-weight:300}
    .modal-close{background:rgba(255,255,255,.2);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;margin-left:16px;line-height:1}
    .modal-close:hover{background:rgba(255,255,255,.35)}
    .modal-body{padding:28px 32px}
    .modal-agree{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;margin-bottom:20px}
    .modal-agree.yes{background:#EDF7F1;color:#2D7A4F}
    .modal-agree.no{background:#FFF0F0;color:#C0392B}

    @media(max-width:560px){
      .card,.res-body,.modal-body{padding:28px 20px}
      .res-hdr,.modal-hdr{padding:28px 20px}
      .res-name,.modal-tname{font-size:22px}
      .t-grid{grid-template-columns:1fr}
      .lock-card{padding:36px 24px}
      .plan-del-btn{display:none}
    }
  </style>
</head>
<body>

<!-- LOCK -->

function isAuth(){ return sessionStorage.getItem(SESSION_KEY) === "true"; }

function getHidden(){
  try{ return JSON.parse(localStorage.getItem(HIDDEN_KEY)||"[]"); }
  catch(e){ return []; }
}
function hideplan(ts){
  var h = getHidden();
  if(h.indexOf(ts)<0){ h.push(ts); localStorage.setItem(HIDDEN_KEY, JSON.stringify(h)); }
}

function unlock(){
  var input = document.getElementById("pw-input");
  var err   = document.getElementById("pw-err");
  if(input.value === STAFF_PASSWORD){
    sessionStorage.setItem(SESSION_KEY,"true");
    document.getElementById("lock-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  } else {
    err.textContent = "Incorrect password. Please try again.";
    input.classList.add("err");
    input.value = "";
    setTimeout(function(){ input.classList.remove("err"); }, 400);
  }
}
document.getElementById("pw-btn").addEventListener("click", unlock);
document.getElementById("pw-input").addEventListener("keydown", function(e){ if(e.key==="Enter") unlock(); });
if(isAuth()){
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function isManiPath(){ return S.treatment==="sig_mani"||S.treatment==="spa_mani"; }
function isPediPath(){ return S.treatment==="sig_pedi"||S.treatment==="spa_pedi"; }
function isTier2(){    return S.treatment==="spa_mani"||S.treatment==="spa_pedi"; }

function getOptions(q){
  var pathKey = isManiPath() ? "mani" : "pedi";
  return q.options.filter(function(o){ return !o.showFor||o.showFor.indexOf(pathKey)>=0; });
}

function buildRec(){
  var a=S.answers, hf=a.health_flags||[], pp=a.product_prefs||[];
  function has(arr,v){ return arr.indexOf(v)>=0; }
  var isPeri=a.hormonal==="peri"||a.hormonal==="hrt",
      isDiab=has(hf,"diabetes"), isIsot=has(hf,"isotretinoin"),
      isArth=has(hf,"arthritis"), isPreg=has(hf,"pregnancy"),
      nutAllerg=has(hf,"nut_allergy"), fragSens=has(hf,"fragrance"),
      isVegan=has(pp,"vegan"), isHalal=has(pp,"halal"),
      noHeat=has(pp,"no_heat")||isIsot, wantsAroma=has(pp,"aromatherapy"),
      nc=a.nail_condition, sf=a.skin_focus,
      mani=isManiPath(), pedi=isPediPath(), tier2=isTier2();

  var steps=[],notes=[],protocols=[];

  // SCRUB
  var scrubName,scrubDetail;
  if(sf==="calluses"){ scrubName="Urea Callus Scrub"; scrubDetail="High-urea mechanical scrub — softens and lifts hard skin before removal. Focus on heel borders, ball of foot, and corn sites."; }
  else if(sf==="cracked_heels"){ scrubName="Exfoliating Heel Scrub"; scrubDetail="Pumice-based scrub with moisturising base. Concentrate on heel fissure borders. Do not scrub open cracks — focus on surrounding hard skin only."; }
  else if(sf==="sensitivity"||isIsot||isPreg){ scrubName="Enzyme Scrub"; scrubDetail="Gentle papaya or pineapple enzyme formula — no abrasive particles. Safe for reactive, isotretinoin-sensitive and pregnancy skin."; }
  else if((sf==="antiaging"||sf==="pigmentation")&&!isPreg){ scrubName="AHA Exfoliating Scrub"; scrubDetail="Lactic or glycolic acid-based — promotes cell turnover and helps fade pigmentation. Avoid on broken skin."; }
  else if(sf==="hydration"||isPeri){ scrubName="Hydrating Sugar Scrub"; scrubDetail="Humectant-rich sugar scrub with hyaluronic acid — gently resurfaces while locking in moisture. Ideal for perimenopausal dry skin."; }
  else{ scrubName="Classic Sugar Scrub"; scrubDetail="Standard exfoliating sugar scrub suited to normal skin in good condition."; }

  // CREAM
  var creamName,creamDetail;
  if(isIsot){ creamName="Barrier Repair Cream"; creamDetail="Fragrance-free ceramide formula. Isotretinoin thins the skin barrier — restores it without aggravating sensitivity."; }
  else if(isPreg){ creamName="Pregnancy-Safe Hydrating Cream"; creamDetail="No retinol, no salicylic acid, no essential oils. Shea butter and hyaluronic acid base — safe for all trimesters."; }
  else if(sf==="antiaging"&&!isPeri){ creamName="Retinol Hand Cream"; creamDetail="Low-concentration retinol to stimulate collagen and reduce fine lines. Apply sparingly, avoid broken skin."; }
  else if(isPeri||sf==="hydration"){ creamName="Peptide-Rich Cream"; creamDetail="Tripeptide and collagen-boosting formula — suited to perimenopausal skin where estrogen loss reduces elasticity and moisture retention."; }
  else if(sf==="pigmentation"){ creamName="Brightening Niacinamide Cream"; creamDetail="Niacinamide and vitamin C blend — targets age spots and uneven pigmentation. Follow with SPF if daytime appointment."; }
  else if(sf==="calluses"||sf==="cracked_heels"){ creamName="Intensive Urea Foot Cream"; creamDetail="High-concentration urea (20-40%) foot cream — continues softening hard skin and healing heel fissures post-treatment. Advise client to use nightly at home."; }
  else if(sf==="sensitivity"||fragSens){ creamName="Fragrance-Free Calming Cream"; creamDetail="Oat extract and allantoin formula — no fragrance, no essential oils. Ideal for reactive or sensitive skin."; }
  else{ creamName="Hydrating Hand and Foot Cream"; creamDetail="Standard nourishing cream with shea and vitamin E. Suitable for normal to dry skin."; }
  if(nutAllerg){ creamDetail+=" Confirm no nut-derived oils in this product before applying."; }

  // NAIL TECHNIQUE
  var nailName=mani?"Russian Manicure":"Russian Pedicure", nailNote;
  if(nc==="fungal"){ nailNote="STOP — active fungal infection present. Do not apply polish or overlay. Antifungal soak treatment only. Advise client to see GP/podiatrist. Sanitise all tools after treatment. Document in client notes."; }
  else if(nc==="onycholysis"){ nailNote="Onycholysis detected — nail plate separating from bed. No soaking, no cleaning under nail plate. BIAB not recommended. Keep nails short. Use gentle technique only. Refer to dermatologist if spreading."; }
  else if(nc==="ingrown"){ nailNote="Ingrown nail present. File straight across only — do not cut corners. Gently clean the groove. Do not attempt to lift embedded nail edge. Refer to podiatrist if inflamed or severely embedded."; }
  else if(nc==="thickened"){ nailNote="Thickened nails — gentle filing only, do not force or apply excessive pressure. If severely thickened or painful, refer to podiatrist. No gel overlay recommended."; }
  else if(nc==="yellow"){ nailNote="Yellow or discoloured nails may indicate fungal infection, product staining, or underlying health issue. Apply antifungal base coat. Do not apply coloured polish until cause identified. Document and advise client."; }
  else if(nc==="brittle"||nc==="soft"){ nailNote="BIAB overlay strongly recommended — protects the nail plate during and after the Russian technique. Avoid prolonged soaking before cuticle work."; }
  else if(nc==="bitten"){ nailNote="Keep nails short and uniform. BIAB overlay will help strengthen and encourage growth. Be gentle around the hyponychium."; }
  else{ nailNote="Standard Russian technique. Nails in good condition — client has full choice of finish."; }

  // HEEL
  var heelNote;
  if(pedi){
    if(isDiab){ heelNote="Electric file only — no blade. Careful around fissures. No aggressive heat. Check circulation before starting."; }
    else if(sf==="cracked_heels"){ heelNote="Extended heel cleanse — focus on fissure borders. Soften thoroughly before any mechanical removal. Blade or file as appropriate to fissure depth."; }
    else if(sf==="calluses"){ heelNote="Medical-grade callus removal — blade or electric file as appropriate. Focus on ball of foot, heel borders, and corn sites. Do not over-remove — leave protective layer."; }
    else{ heelNote="Standard heel cleanse — blade or electric file as appropriate. Focus on lateral heel borders and ball of foot."; }
  }

  // THERMAL
  var thermalName,thermalDetail;
  if(tier2){
    if(noHeat){ thermalName=mani?"Hydrating Hand Mask":"Hydrating Foot Mask"; thermalDetail="Paraffin not suitable. Apply hydrating mask with cling wrap and mitts/booties for 8-10 minutes instead."; }
    else if(isDiab){ thermalName=mani?"Warm Hand Mask":"Warm Foot Mask"; thermalDetail="Paraffin not recommended for diabetic clients. Use warm (not hot) mask with careful temperature monitoring."; }
    else if(isPreg){ thermalName=mani?"Hydrating Hand Mask":"Hydrating Foot Mask"; thermalDetail="Paraffin avoided during pregnancy due to high heat. Hydrating mask applied at comfortable temperature."; }
    else if(sf==="hydration"||isPeri||sf==="cracked_heels"){ thermalName="Paraffin Bath"; thermalDetail="Paraffin strongly recommended — maximum moisture penetration for dry, perimenopausal, or cracked skin. Double-dip for best results."; }
    else{ thermalName=mani?"Hand Mask or Paraffin Bath":"Foot Mask or Paraffin Bath"; thermalDetail="Either suits this client — paraffin gives deeper moisture, mask is lighter. Offer the choice."; }
  }

  // MASSAGE
  var massageDetail;
  if(tier2){
    if(isPreg){ massageDetail=mani?"Gentle hand and forearm massage only. Avoid deep pressure on wrist acupressure points. Light effleurage strokes throughout.":"Gentle foot massage — avoid Spleen 6 and Bladder 60 acupressure points. Light effleurage only."; }
    else if(isPeri||a.hormonal==="hrt"){ massageDetail=mani?"Extended lymphatic drainage — focus on dorsal hand and wrist. Helps with fluid retention common in perimenopause.":"Reflexology-based massage with lymphatic drainage. Focus on arch and ankle. Helps with swelling and circulation."; }
    else if(isArth){ massageDetail=mani?"Gentle joint mobilisation — avoid deep pressure on finger joints. Warm hands thoroughly first.":"Gentle effleurage around ankle and foot — avoid deep pressure on toe joints."; }
    else{ massageDetail=mani?"Standard hand and forearm massage — adjust pressure to client preference.":"Standard foot and lower leg massage — adjust pressure to client preference."; }
  }

  // AROMATHERAPY
  var aromaDetail;
  if(wantsAroma){
    if(isPreg){ aromaDetail="Client wants aromatherapy but is pregnant. Only Roman chamomile and lavender (low dilution, after 1st trimester) considered safe. Confirm with client and exercise caution."; }
    else if(sf==="sensitivity"||fragSens){ aromaDetail="Client interested in aromatherapy but has sensitive skin — use chamomile or unscented base only. Patch test before applying."; }
    else if(isPeri){ aromaDetail="Recommend clary sage or geranium — both support hormonal balance. Dilute to 1% in carrier oil."; }
    else{ aromaDetail="Recommend lavender for relaxation, eucalyptus for refreshing and circulation. Dilute to 1-2% in carrier oil. Confirm no fragrance sensitivity."; }
  }

  // FINISH
  var finishDetail;
  if(nc==="fungal"){ finishDetail="No polish or overlay — active fungal infection. Antifungal base only if condition is mild and client insists, otherwise leave bare and advise treatment."; }
  else if(isHalal){ finishDetail="Halal breathable / water-permeable polish — wudu compatible. Confirm colour choice with client."; }
  else if(nc==="thickened"||nc==="onycholysis"){ finishDetail="Simple polish only — no Gel Polish, Hard Gel or BIAB overlay. Keep nails short."; }
  else if(nc==="brittle"||nc==="soft"||nc==="bitten"){ finishDetail="BIAB recommended to protect and strengthen. Hard Gel is also suitable for added structure. If client prefers Gel Polish or Simple Polish, note increased fragility and advise accordingly."; }
  else{ finishDetail="Client choice — Gel Polish, BIAB, Hard Gel, or Simple Polish. All suitable for current nail condition."; }

  // BUILD STEPS
  steps.push({name:nailName,detail:nailNote,tag:nc==="fungal"?"Referral required":nc==="ingrown"?"Handle with care":null});
  if(pedi) steps.push({name:"Heel Cleanse",detail:heelNote,tag:isDiab?"Diabetic-safe":null});
  steps.push({name:scrubName,detail:scrubDetail,tag:null,ts:"s"});
  if(tier2) steps.push({name:thermalName,detail:thermalDetail,tag:noHeat?"Paraffin replaced":isPreg?"Pregnancy-safe":null});
  steps.push({name:creamName,detail:creamDetail,tag:isPreg?"Pregnancy-safe":null});
  if(tier2) steps.push({name:mani?"Hand Massage":"Foot Massage",detail:massageDetail,tag:isPreg?"Modified for pregnancy":null});
  if(wantsAroma) steps.push({name:"Aromatherapy",detail:aromaDetail||"",tag:isPreg?"Use with caution":null,ts:"s"});
  steps.push({name:"Finish",detail:finishDetail,tag:isHalal?"Halal polish":nc==="fungal"?"No polish":null});

  if(isDiab)        protocols.push("Diabetic-Safe Protocol");
  if(isIsot)        protocols.push("Isotretinoin-Safe");
  if(isPreg)        protocols.push("Pregnancy Protocol");
  if(isVegan)       protocols.push("Vegan Products");
  if(isHalal)       protocols.push("Halal Polish");
  if(fragSens)      protocols.push("Fragrance-Free");
  if(nc==="fungal") protocols.push("Infection Control");

  if(isDiab)    notes.push("Diabetic protocol — no blade on feet, careful heat monitoring, no cutting near skin folds.");
  if(isIsot)    notes.push("Client on isotretinoin — no paraffin, no aggressive exfoliation, no essential oils.");
  if(isPreg)    notes.push("Pregnancy: no retinol, no AHA on broken skin, no deep pressure on acupressure points, no high heat, minimal essential oils.");
  if(nc==="fungal") notes.push("Active fungal infection — no polish applied. Tools must be sanitised after use. Client referred to GP/podiatrist.");
  if(isPeri&&sf==="pigmentation") notes.push("SPF hand cream recommended at end of appointment — pigmentation accelerates with estrogen decline.");
  if((nc==="brittle"||nc==="soft")&&!isHalal) notes.push("Discuss BIAB overlay with client — explain long-term nail health benefit over standard gel.");

  return {steps:steps,notes:notes,protocols:protocols};
}

function saveToSheets(rec){
  if(!SHEETS_URL) return;
  S.saveStatus="saving"; render();
  var a=S.answers, t=TREATMENTS[S.treatment];
  var payload={
    timestamp:      new Date().toLocaleString("nl-NL",{timeZone:"Europe/Amsterdam"}),
    client_name:    S.clientName||"—",
    treatment:      t?t.tier+" — "+t.name:"—",
    hormonal:       a.hormonal||"—",
    skin_focus:     a.skin_focus||"—",
    nail_condition: a.nail_condition||"—",
    health_flags:   (a.health_flags||[]).join(", ")||"None",
    preferences:    (a.product_prefs||[]).join(", ")||"None",
    recommended:    rec.steps.map(function(s){ return s.name; }).join(" · "),
    steps_json:     JSON.stringify(rec.steps),
    protocols:      rec.protocols.join(", ")||"None",
    therapist_notes:rec.notes.join(" | ")||"None",
    agreed:         S.agreed?"Yes":"No",
    alt_path:       S.altPath||""
  };
  fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
    .then(function(){ S.saveStatus="saved"; render(); })
    .catch(function(){ S.saveStatus="error"; render(); });
  var cached=JSON.parse(localStorage.getItem("nm_plans")||"[]");
  cached.unshift(payload);
  if(cached.length>200) cached=cached.slice(0,200);
  localStorage.setItem("nm_plans",JSON.stringify(cached));
}

function fetchPlans(){
  S.plansLoading=true; S.pendingDelete=null; render();
  if(SHEETS_URL){
    fetch(SHEETS_URL)
      .then(function(r){ return r.json(); })
      .then(function(data){
        S.plans=Array.isArray(data)?data:[];
        // also merge any locally cached plans not yet in sheets
        var local=JSON.parse(localStorage.getItem("nm_plans")||"[]");
        var sheetTs=S.plans.map(function(p){ return p.timestamp||p["Timestamp"]||""; });
        local.forEach(function(lp){
          var ts=lp.timestamp||"";
          if(ts&&sheetTs.indexOf(ts)<0) S.plans.unshift(lp);
        });
        S.plansLoading=false; render();
      })
      .catch(function(){
        S.plans=JSON.parse(localStorage.getItem("nm_plans")||"[]");
        S.plansLoading=false; render();
      });
  } else {
    S.plans=JSON.parse(localStorage.getItem("nm_plans")||"[]");
    S.plansLoading=false; render();
  }
}

function selectTreatment(key){ S.treatment=key; S.currentQ=0; S.history=[]; render(); }

function handleSingle(value){
  S.answers[QUESTIONS[S.currentQ].id]=value;
  S.history.push(S.currentQ); S.currentQ++;
  if(S.currentQ>=QUESTIONS.length) S.done=true;
  render();
}

function handleMultiToggle(value){
  if(value==="none"){ S.multiSelected=["none"]; }
  else{
    var w=S.multiSelected.filter(function(v){ return v!=="none"; });
    S.multiSelected=S.multiSelected.indexOf(value)>=0?w.filter(function(v){ return v!==value; }):w.concat([value]);
  }
  render();
}

function handleMultiContinue(){
  if(!S.multiSelected.length) return;
  S.answers[QUESTIONS[S.currentQ].id]=S.multiSelected.slice();
  S.history.push(S.currentQ); S.currentQ++; S.multiSelected=[];
  if(S.currentQ>=QUESTIONS.length) S.done=true;
  render();
}

function handleBack(){
  if(S.done){ S.done=false; S.agreed=null; S.altPath=""; S.saveStatus="idle"; S.currentQ=QUESTIONS.length-1; return render(); }
  if(S.currentQ===0){ S.treatment=null; return render(); }
  var prev=S.history.pop();
  var pq=QUESTIONS[prev];
  S.multiSelected=(pq&&pq.type==="multi")?(S.answers[pq.id]||[]):[];
  S.currentQ=prev; render();
}

function handleRestart(){
  S.clientName=""; S.treatment=null; S.answers={}; S.history=[];
  S.currentQ=0; S.multiSelected=[]; S.done=false;
  S.agreed=null; S.altPath=""; S.saveStatus="idle";
  render();
}

function el(tag,attrs){
  var e=document.createElement(tag);
  var children=Array.prototype.slice.call(arguments,2);
  if(attrs){ Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==="class") e.className=v;
    else if(k==="style") e.style.cssText=v;
    else if(k.indexOf("on")===0) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }); }
  children.forEach(function(c){
    if(c==null) return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}

function render(){
  if(!isAuth()) return;
  var main=document.getElementById("main");
  main.innerHTML="";
  if(S.tab==="plans"){ main.appendChild(renderPlans()); return; }
  var total=QUESTIONS.length+1;
  var cur=S.done?total:S.treatment?S.currentQ+1:0;
  document.getElementById("progress").style.width=(cur/total*100)+"%";
  if(!S.treatment){ main.appendChild(renderSelect()); return; }
  if(S.done){ main.appendChild(renderResult()); return; }
  main.appendChild(renderQuestion());
}

function renderSelect(){
  var card=el("div",{"class":"card"});
  card.appendChild(el("div",{"class":"step-lbl"},"Step 1 — Select Treatment"));
  card.appendChild(el("div",{"class":"question"},"Which treatment has the client booked?"));
  card.appendChild(el("div",{"class":"q-note"},"Add-ons (French, nail art, extensions, removal) are handled separately at booking."));
  var nw=el("div",{"class":"cname-wrap"});
  nw.appendChild(el("div",{"class":"cname-lbl"},"Client Name (optional)"));
  var ni=el("input",{"class":"cname-input","type":"text","placeholder":"e.g. Maria","value":S.clientName});
  ni.addEventListener("input",function(e){ S.clientName=e.target.value; });
  nw.appendChild(ni); card.appendChild(nw);
  var grid=el("div",{"class":"t-grid"});
  Object.keys(TREATMENTS).forEach(function(key){
    var t=TREATMENTS[key];
    (function(k){ grid.appendChild(el("div",{"class":"t-tile","onClick":function(){ selectTreatment(k); }},
      el("div",{"class":"t-icon"},t.icon),
      el("div",{"class":"t-tier"},t.tier),
      el("div",{"class":"t-name"},t.name),
      el("div",{"class":"t-inc"},t.inc))); })(key);
  });
  card.appendChild(grid);
  return card;
}

function renderQuestion(){
  var q=QUESTIONS[S.currentQ];
  var opts=getOptions(q);
  var card=el("div",{"class":"card"});
  card.appendChild(el("button",{"class":"back-btn","onClick":handleBack},"← Back"));
  if(S.currentQ===0){
    var nw=el("div",{"class":"cname-wrap"});
    nw.appendChild(el("div",{"class":"cname-lbl"},"Client Name (optional)"));
    var ni=el("input",{"class":"cname-input","type":"text","placeholder":"e.g. Maria","value":S.clientName});
    ni.addEventListener("input",function(e){ S.clientName=e.target.value; });
    nw.appendChild(ni); card.appendChild(nw);
  }
  card.appendChild(el("div",{"class":"step-lbl"},"Step "+(S.currentQ+1)+" of "+QUESTIONS.length));
  card.appendChild(el("div",{"class":"question"},q.q));
  if(q.note) card.appendChild(el("div",{"class":"q-note"},q.note));
  var optWrap=el("div",{"class":"options"});
  if(q.type==="single"){
    opts.forEach(function(o){
      (function(val){ optWrap.appendChild(el("button",{"class":"opt-btn","onClick":function(){ handleSingle(val); }},
        el("div",{"class":"opt-icon"},o.i),
        el("div",{"class":"opt-text"},el("div",{"class":"opt-title"},o.t),o.s?el("div",{"class":"opt-sub"},o.s):null),
        el("span",{"class":"opt-arr"},"›"))); })(o.v);
    });
    card.appendChild(optWrap);
  }
  if(q.type==="multi"){
    card.appendChild(el("div",{"class":"multi-hint"},"Select all that apply, then press Continue"));
    opts.forEach(function(o){
      var chk=S.multiSelected.indexOf(o.v)>=0;
      (function(val){ optWrap.appendChild(el("div",{"class":"multi-opt"+(chk?" checked":""),"onClick":function(){ handleMultiToggle(val); }},
        el("div",{"class":"chk"},chk?"✓":""),
        el("div",{"class":"opt-icon"},o.i),
        el("div",{"class":"opt-text"},el("div",{"class":"opt-title"},o.t)))); })(o.v);
    });
    card.appendChild(optWrap);
    var btn=el("button",{"class":"cont-btn","onClick":handleMultiContinue},"Continue →");
    if(!S.multiSelected.length) btn.setAttribute("disabled","true");
    card.appendChild(btn);
  }
  return card;
}

function renderResult(){
  var rec=buildRec(), t=TREATMENTS[S.treatment];
  var wrap=el("div",{"class":"res-card"});
  wrap.appendChild(el("div",{"class":"res-hdr"},
    el("div",{"class":"res-tier"},t.tier+" · Personalised Treatment Plan"),
    el("div",{"class":"res-name"},t.name),
    el("div",{"class":"res-client"},S.clientName?"Client: "+S.clientName:"Treatment guide ready")));
  var body=el("div",{"class":"res-body"});
  body.appendChild(el("div",{"class":"sec-lbl"},"Personalised Treatment Steps"));
  var stepsEl=el("div",{"class":"steps"});
  rec.steps.forEach(function(s,i){
    var item=el("div",{"class":"step-item"},el("div",{"class":"step-num"},String(i+1)));
    var content=el("div",{"class":"step-body"},el("div",{"class":"step-name"},s.name),el("div",{"class":"step-detail"},s.detail));
    if(s.tag) content.appendChild(el("div",{"class":"step-tag"+(s.ts==="s"?" s":"")},s.tag));
    item.appendChild(content); stepsEl.appendChild(item);
  });
  body.appendChild(stepsEl);
  if(rec.protocols.length){
    body.appendChild(el("div",{"class":"sec-lbl"},"Applied Protocols"));
    var pb=el("div",{"class":"protocols"});
    rec.protocols.forEach(function(p){ pb.appendChild(el("div",{"class":"badge"},p)); });
    body.appendChild(pb);
  }
  if(rec.notes.length){
    var nb=el("div",{"class":"notes-box"});
    nb.appendChild(el("div",{"class":"notes-lbl"},"Therapist Notes"));
    rec.notes.forEach(function(n){ nb.appendChild(el("div",{"class":"note-item"},el("span",{},"→"),n)); });
    body.appendChild(nb);
  }
  body.appendChild(renderAgreement(rec));
  wrap.appendChild(body);
  return wrap;
}

function renderAgreement(rec){
  var sec=el("div",{"class":"agree-sec"});
  sec.appendChild(el("div",{"class":"agree-q"},"Does the client agree with this proposed plan?"));
  if(S.agreed===null){
    var btns=el("div",{"class":"agree-btns"});
    btns.appendChild(el("button",{"class":"agree-btn yes","onClick":function(){ S.agreed=true; saveToSheets(buildRec()); render(); }},"✓  Yes, proceed"));
    btns.appendChild(el("button",{"class":"agree-btn no","onClick":function(){ S.agreed=false; render(); }},"✗  No, adjust"));
    sec.appendChild(btns);
  } else if(S.agreed===true){
    var sm={"saving":{cls:"saving",icon:"⏳",text:"Saving plan to records…"},"saved":{cls:"saved",icon:"✓",text:"Plan saved to records"},"error":{cls:"error",icon:"⚠️",text:"Could not save — check Sheets connection"}};
    var sv=sm[S.saveStatus]; if(sv) sec.appendChild(el("div",{"class":"save-status "+sv.cls},sv.icon+"  "+sv.text));
    sec.appendChild(el("button",{"class":"restart-btn","onClick":handleRestart},"New Client ↺"));
  } else if(S.agreed===false){
    sec.appendChild(el("div",{"class":"alt-lbl"},"What is the chosen path? Please describe the adjusted treatment:"));
    var ta=document.createElement("textarea");
    ta.className="alt-input"; ta.placeholder="Describe the adjustments or alternative treatment chosen by the client...";
    ta.setAttribute("rows","3"); ta.value=S.altPath;
    ta.addEventListener("input",function(e){ S.altPath=e.target.value; });
    sec.appendChild(ta);
    var saveBtn=el("button",{"class":"save-plan-btn","onClick":function(){ if(!S.altPath.trim()) return; saveToSheets(buildRec()); render(); }},"Save Adjusted Plan");
    if(S.saveStatus==="saving"||S.saveStatus==="saved") saveBtn.setAttribute("disabled","true");
    sec.appendChild(saveBtn);
    var sm2={"saving":{cls:"saving",icon:"⏳",text:"Saving adjusted plan…"},"saved":{cls:"saved",icon:"✓",text:"Adjusted plan saved"},"error":{cls:"error",icon:"⚠️",text:"Could not save — check Sheets connection"}};
    var sv2=sm2[S.saveStatus]; if(sv2) sec.appendChild(el("div",{"class":"save-status "+sv2.cls},sv2.icon+"  "+sv2.text));
    if(S.saveStatus==="saved") sec.appendChild(el("button",{"class":"restart-btn","style":"margin-top:10px","onClick":handleRestart},"New Client ↺"));
  }
  return sec;
}

// ── PLANS TAB ─────────────────────────────────────
function renderPlans(){
  var hidden=getHidden();
  var visible=S.plans.filter(function(p){
    var ts=String(p.timestamp||p["Timestamp"]||"");
    return hidden.indexOf(ts)<0;
  });

  var wrap=el("div",{"class":"plans-wrap"});
  var toolbar=el("div",{"class":"plans-toolbar"});
  toolbar.appendChild(el("div",{"class":"plans-title"},"Treatment Plans"));
  toolbar.appendChild(el("button",{"class":"refresh-btn","onClick":fetchPlans},"↺ Refresh"));
  wrap.appendChild(toolbar);

  if(S.plansLoading){ wrap.appendChild(el("div",{"class":"plans-loading"},"Loading plans…")); return wrap; }

  if(!visible.length){
    wrap.appendChild(el("div",{"class":"plans-empty"},"No plans saved yet. Complete a consultation and save a plan to see it appear here."));
    return wrap;
  }

  var list=el("div",{"class":"plans-list"});
  visible.forEach(function(p){
    var name=p.client_name||p["Client Name"]||"Unknown client";
    var treatment=p.treatment||p["Treatment"]||"—";
    var time=String(p.timestamp||p["Timestamp"]||"—");
    var agreed=p.agreed||p["Agreed"]||"";
    var ts=String(p.timestamp||p["Timestamp"]||"");
    var isPending=S.pendingDelete===ts;

    var row=el("div",{"class":"plan-row"});
    row.appendChild(el("div",{"class":"plan-dot"}));

    // Clickable info area
    (function(plan){ row.appendChild(el("div",{"class":"plan-info","onClick":function(){ openModal(plan); }},
      el("div",{"class":"plan-name"},name),
      el("div",{"class":"plan-meta"},treatment+" · "+time+(agreed?" · "+agreed:"")))); })(p);

    // Open arrow
    (function(plan){ row.appendChild(el("button",{"class":"plan-open-btn","onClick":function(){ openModal(plan); }},"›")); })(p);

    // Delete / confirm
    if(!isPending){
      (function(t){ row.appendChild(el("button",{"class":"plan-del-btn","onClick":function(e){
        e.stopPropagation(); S.pendingDelete=t; render();
      }},"Delete")); })(ts);
    } else {
      var conf=el("div",{"class":"del-confirm"});
      conf.appendChild(el("span",{"class":"del-confirm-txt"},"Remove?"));
      (function(t){ conf.appendChild(el("button",{"class":"del-yes-btn","onClick":function(e){
        e.stopPropagation(); hideplan(t); S.pendingDelete=null; render();
      }},"Yes")); })(ts);
      conf.appendChild(el("button",{"class":"del-no-btn","onClick":function(e){
        e.stopPropagation(); S.pendingDelete=null; render();
      }},"Cancel"));
      row.appendChild(conf);
    }

    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

function openModal(plan){ renderModal(plan); }

function renderModal(p){
  var root=document.getElementById("modal-root");
  root.innerHTML="";
  var name=p.client_name||p["Client Name"]||"Client";
  var treatment=p.treatment||p["Treatment"]||"—";
  var time=p.timestamp||p["Timestamp"]||"—";
  var protocols=p.protocols||p["Protocols"]||"";
  var notes_=p.therapist_notes||p["Therapist Notes"]||"";
  var agreed=p.agreed||p["Agreed"]||"";
  var altPath=p.alt_path||p["Alt Path"]||"";
  var stepsJson=p.steps_json||p["Steps Detail"]||"";
  var tierStr="",tName=treatment;
  var dashIdx=treatment.indexOf(" — ");
  if(dashIdx>-1){ tierStr=treatment.slice(0,dashIdx); tName=treatment.slice(dashIdx+3); }

  var overlay=el("div",{"class":"modal-overlay","onClick":function(e){ if(e.target===overlay) closeModal(); }});
  var card=el("div",{"class":"modal-card"});
  var hdr=el("div",{"class":"modal-hdr"});
  hdr.appendChild(el("div",{"class":"modal-hdr-text"},
    el("div",{"class":"modal-tier"},tierStr+" · "+time),
    el("div",{"class":"modal-tname"},tName),
    el("div",{"class":"modal-client"},"Client: "+name)));
  hdr.appendChild(el("button",{"class":"modal-close","onClick":closeModal},"×"));
  card.appendChild(hdr);

  var body=el("div",{"class":"modal-body"});
  if(agreed){
    var agCls=agreed.toLowerCase()==="yes"?"yes":"no";
    body.appendChild(el("div",{"class":"modal-agree "+agCls},agreed.toLowerCase()==="yes"?"✓ Client agreed":"✗ Client adjusted plan"));
  }
  if(altPath){
    var nb2=el("div",{"class":"notes-box","style":"margin-bottom:16px"});
    nb2.appendChild(el("div",{"class":"notes-lbl"},"Adjusted Treatment Path"));
    nb2.appendChild(el("div",{"class":"note-item"},el("span",{},"→"),altPath));
    body.appendChild(nb2);
  }
  var parsedSteps=[];
  if(stepsJson){ try{ parsedSteps=JSON.parse(stepsJson); }catch(e){} }
  if(parsedSteps.length){
    body.appendChild(el("div",{"class":"sec-lbl","style":"margin-bottom:12px"},"Treatment Steps"));
    var stepsEl=el("div",{"class":"steps"});
    parsedSteps.forEach(function(s,i){
      var item=el("div",{"class":"step-item"},el("div",{"class":"step-num"},String(i+1)));
      var content=el("div",{"class":"step-body"},el("div",{"class":"step-name"},s.name||""),el("div",{"class":"step-detail"},s.detail||""));
      if(s.tag) content.appendChild(el("div",{"class":"step-tag"+(s.ts==="s"?" s":"")},s.tag));
      item.appendChild(content); stepsEl.appendChild(item);
    });
    body.appendChild(stepsEl);
  }
  if(protocols&&protocols!=="None"){
    body.appendChild(el("div",{"class":"sec-lbl","style":"margin-bottom:10px"},"Protocols"));
    var pb=el("div",{"class":"protocols"});
    protocols.split(",").forEach(function(p2){ if(p2.trim()) pb.appendChild(el("div",{"class":"badge"},p2.trim())); });
    body.appendChild(pb);
  }
  if(notes_&&notes_!=="None"){
    var nb3=el("div",{"class":"notes-box"});
    nb3.appendChild(el("div",{"class":"notes-lbl"},"Therapist Notes"));
    notes_.split("|").forEach(function(n){ if(n.trim()) nb3.appendChild(el("div",{"class":"note-item"},el("span",{},"→"),n.trim())); });
    body.appendChild(nb3);
  }
  card.appendChild(body);
  overlay.appendChild(card);
  root.appendChild(overlay);
}

function closeModal(){
  document.getElementById("modal-root").innerHTML="";
}

if(isAuth()) render();
</script>
</body>
</html>
